- type: ncRetrievalContract
  id: ForgeRetrievalEasyLostCrate
  name: "Потерянная пломба"
  description: "Найдите меченый ящик примерно в 14000 метрах от станции и верните его в торговый автомат."
  icon: ForgeTradeCargoExpeditionCrate
  cargo:
  - prototype: ForgeTradeCargoExpeditionCrate
    count: 1
  route: ForgeTradeRouteCargoToTraderEasy
  reward:
  - type: Currency
    currency: BankCredit
    count: 40000
  - type: Pool
    pool: ForgeExpeditionRewardBasic
    count: { min: 2, max: 4 }

