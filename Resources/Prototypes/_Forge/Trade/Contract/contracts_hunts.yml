- type: ncHuntContract
  id: ForgeHuntMediumMercenaryRaiders
  name: "Отряд наёмников"
  description: "Вооружённый отряд наёмников занял дрейфующий объект и готовит засаду на экспедиционные маршруты. Зачистите объект и принесите трофейную метку."
  icon: MobMercenarySpecialistAssault
  activeTimeLimitSeconds: 1800
  gridNames:
  - "опорник «Гранит»"
  - "полевой форт «Клык»"
  - "наёмный блокпост «Север»"
  - "военный причал «Рубикон»"
  - "укрепление «Рейнджер»"
  targets:
  - group: ForgeHuntGroupMercenaryVeterans
    count: 16
  - prototype: MobMercenaryCaptain
    count: 1
  completion:
    mode: TrophyTurnIn
    trophy: ForgeTradeContractProofHuntTrophy
  spawn:
    point:
      type: Store
    dungeonExteriorTilePreset: ForgeHuntDungeonExteriorTilesBasalt
    dungeonExteriorRockPreset: ForgeHuntDungeonExteriorRocksBasalt
    dungeons:
    - prototype: ForgeHuntDungeonLavaMercenary
      weight: 5
    - prototype: ForgeHuntDungeonLavaMercenaryCompact
      weight: 3
    - prototype: ForgeHuntVGRoidBasalt
      weight: 2
  reward:
  - type: Currency
    currency: BankCredit
    count: 160000
  - type: Pool
    pool: ForgeExpeditionRewardAdvanced
    count: { min: 4, max: 6 }

