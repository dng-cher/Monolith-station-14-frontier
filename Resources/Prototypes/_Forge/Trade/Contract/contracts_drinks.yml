- type: ncSupplyContract
  id: ForgeDrinkEasyMartini
  name: "Офицерский приём"
  description: "Смешайте полные бокалы классического мартини для офицерского приёма. Половину напитков вернут для команды, но повторно сдать их нельзя."
  icon: ForgeContractDrinkIconMartini
  returnFraction: 0.5
  targets:
  - reagent: Martini
    solution: any
    reagentAmount: 20
    count: 4
  reward:
  - type: Currency
    currency: BankCredit
    count: 10000
  - type: Pool
    pool: ForgeExpeditionRewardBarBasic
    count: { min: 1, max: 3 }

