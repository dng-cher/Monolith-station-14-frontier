    prototype: SpawnDungeonLootMaterialsValuableFull
    count: { min: 2, max: 4 }
  - type: Pool
    pool: ForgeExpeditionRewardBasic
    count: { min: 1, max: 3 }
  - type: Pool
    pool: ForgeArtifactStudyResearchGeneratorChance
    count: 1

