  name: "Слабый резонанс"
  description: "Отделу ксеноархеологии нужен первичный разбор безопасного артефакта. Раскройте все его узлы и принесите объект к терминалу."
  icon: ForgeContractStudyArtifactEasy
  artifact: ForgeContractStudyArtifactEasy
  spawn:
    point:
      type: Store
  reward:
