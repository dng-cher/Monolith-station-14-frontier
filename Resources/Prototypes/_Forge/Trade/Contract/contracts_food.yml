- type: ncSupplyContract
  id: ForgeFoodEasyCheeseburgers
  name: "Сырные бургеры для вахты"
  description: "Приготовьте партию сырных бургеров для вахтовой смены. Половину блюд вернут как обед для команды, но повторно сдать их нельзя."
  icon: FoodBurgerCheese
  returnFraction: 0.5
  targets:
  - prototype: FoodBurgerCheese
    count: 4
  reward:
  - type: Currency
    currency: BankCredit
    count: 10000
  - type: Pool
    pool: ForgeExpeditionRewardFoodBasic
    count: { min: 1, max: 3 }

