              key: ForcedSleep
              component: ForcedSleeping
              time: 2
              type: Add
              probability: 0.06
            - !type:Emote
              emote: Yawn
              showInChat: true
              probability: 0.3
            - !type:GenericStatusEffect
              key: Drowsiness
              component: Drowsiness
              type: Add
              time: 5
              probability: 0.5
            - !type:GenericStatusEffect
              key: SeeingRainbows
              component: SeeingRainbows
              type: Add
              time: 20
              refresh: false
              probability: 0.45
            - !type:GenericStatusEffect
              key: TemporaryBlindness
              component: TemporaryBlindness
              time: 3
              type: Add
              probability: 0.2
