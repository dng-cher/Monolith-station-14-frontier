          flareOnly: true
          chance: 0.1
          effects:
            - !type:GenericStatusEffect
              key: Drowsiness
              component: Drowsiness
              type: Add
              time: 16
            - !type:TunnelVision
              intensity: 1.4
              pulse: 0.3
              darkness: 0.6
              color: "#3d5c68"
              time: 16

# region // NicotineAddiction
- type: syndrome
  id: NicotineAddiction
  name: syndrome-nicotine-addiction
  organ: Body
  interval: 20
  severityDecay: 0.001
  flareDelay: 360
  stages:
    - minSeverity: 0
    # region Stage 1
    - minSeverity: 20
      symptoms:
        - !type:EntityEffectList # name: maybe little smoke?
          flareOnly: true
          effects:
            - !type:PopupMessage
              type: Local
              messages:
                - syndrome-nicotine-hint-1
                - syndrome-nicotine-hint-2
                - syndrome-nicotine-hint-3
              visualType: Medium
              probability: 0.5
    # region Stage 2
    - minSeverity: 50
      symptoms:
        - !type:EntityEffectList # name: *Cough*... Ah, the sweet taste of bad decisions.
          effects:
            - !type:Emote
              emote: Cough
              probability: 0.02
        - !type:EntityEffectList # name: maybe smoke?
          flareOnly: true
          effects:
            - !type:Jitter
              amplitude: 1.5
              frequency: 1.5
              time: 3
              probability: 0.03
            - !type:Emote
              emote: Cough
              probability: 0.4
            - !type:PopupMessage
              type: Local
              messages:
                - syndrome-nicotine-flare-moderate-1
                - syndrome-nicotine-flare-moderate-2
              visualType: MediumCaution
              probability: 0.45
    # region Stage 3
    - minSeverity: 80
      symptoms:
        - !type:EntityEffectList # name: *Cough*... Ah, the sweet taste of bad decisions.
          effects:
            - !type:Emote
              emote: Cough
              probability: 0.03
            - !type:Emote
              emote: Sneeze
              probability: 0.01
        - !type:EntityEffectList # name: ahh, cigaretts..
          flareOnly: true
          effects:
            - !type:Jitter
              amplitude: 2.0
              frequency: 2.0
              time: 4
              probability: 0.04
            - !type:Emote
              emote: Cough
              probability: 0.2
            - !type:Emote
              emote: Sneeze
              probability: 0.05
            - !type:PopupMessage
              type: Local
              messages:
                - syndrome-nicotine-flare-severe-1
                - syndrome-nicotine-flare-severe-2
              visualType: MediumCaution
              probability: 0.45
            - !type:PopupMessage # How about a smoke break, Colonel? This is highly stressful work...
              type: Local
              messages:
                - syndrome-nicotine-flare-special-1
              visualType: SmallCaution
              probability: 0.08
