# Рецепты одежды Tel-Adi для принтера униформы (UniformPrinter) и
# аварийного импланта для экзокостюмного фабрикатора (ExosuitFabricator).
# Разблокируются исследованиями TelAdiClothing / TelAdiEmergencyLimb.
# Имя рецепта берётся из имени предмета-результата (поле name не нужно).

# ── Униформа / обувь Tel-Adi ──
- type: latheRecipe
