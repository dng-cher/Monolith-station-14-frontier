    contents:
      - id: SyringeHaloperidol
      - id: PillCanisterNaloxone

- type: entity
  name: pill canister
  parent: PillCanister
  id: PillCanisterNaloxone
  suffix: Naloxone 9u, 5
  components:
  - type: Label
    currentLabel: Naloxone 9u
  - type: StorageFill
    contents:
    - id: PillNaloxone
      amount: 5

- type: entity
  name: pill
  suffix: Naloxone 9u
  parent: Pill
  id: PillNaloxone
  components:
