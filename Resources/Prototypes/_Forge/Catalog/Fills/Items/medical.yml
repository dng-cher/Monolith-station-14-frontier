    pillType: 7
  - type: Sprite
    state: pill8
  - type: Label
    currentLabel: Naloxone 9u
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Naloxone
          Quantity: 9

