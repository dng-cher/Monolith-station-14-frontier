    sprite: Forge/Objects/Specific/Medical/firstaidkits.rsi
    state: antiaddict
  - type: Item
    sprite: Forge/Objects/Specific/Medical/firstaidkits.rsi
    heldPrefix: antiaddict
  - type: StorageFill
    contents:
      - id: SyringeHaloperidol
      - id: PillCanisterNaloxone
