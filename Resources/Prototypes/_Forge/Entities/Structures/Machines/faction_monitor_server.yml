- type: entity
  id: CrewMonitoringRenegadeServer
  parent: [CrewMonitoringServer, BaseStructureDisableToolUse]
  suffix: Renegade
  name: crew renegade monitoring server
  description: Receives and relays the status of all active renegade implant sensors.
  components:
    - type: Sprite
      sprite: Forge/Structures/Machines/server.rsi
      layers:
        - state: server-crew
        - state: variant-crew-renegade
    - type: DeviceNetwork
      deviceNetId: Wireless
      transmitFrequencyId: CrewRenegadeMonitor
      receiveFrequencyId: SuitRenegadeSensor
      autoConnect: false

