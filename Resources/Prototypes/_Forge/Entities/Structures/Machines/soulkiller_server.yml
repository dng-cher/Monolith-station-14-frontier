# ══════════════════════════════════════════════════════════
# Сервер Душегуба — релейная точка для ока ИИ.
# Свяжи его с ядром Душегуба сетевым конфигуратором (порт SoulkillerLink),
# и оператор сможет перебросить око к серверу (например, на удалённый шаттл),
# чтобы видеть и взаимодействовать вокруг него. Назад — «Прыжок к ядру».
# ══════════════════════════════════════════════════════════

- type: entity
  parent: BaseStructureDynamic
  id: SoulkillerServer
  name: сервер С.У.И
  description: Релейный сервер корпорации Tel-Adi. Свяжи его с ядром С.У.И сетевым конфигуратором — и оператор сможет перебросить око ИИ к серверу, чтобы видеть и действовать вокруг него (например, на удалённом шаттле).
  suffix: ТелАди
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: Structures/Machines/server.rsi
    layers:
    - state: server
    - state: variant-research
    - state: server_o
  - type: Appearance
  - type: SoulkillerServer
  # Обзор для ока ИИ на гриде сервера (например, на шаттле) — иначе «нет камер».
  - type: StationAiVision
    range: 16
    occluded: false
  # Связь с ядром Душегуба — сетевым конфигуратором (мультитулом).
  - type: DeviceLinkSource
    ports:
    - SoulkillerLink
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 100
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
