# ══════════════════════════════════════════════════════════
# Капсула Душегуба — криокапсула, куда ложится КПБ.
# Закрывается как криосон → сознание оператора переносится в оболочку
# Душегуба, тело остаётся запечатанным внутри. В отличие от обычного
# криосна, капсулу можно вскрыть снаружи (любой), насильно разорвав
# контакт и выдернув оператора обратно в тело.
# ══════════════════════════════════════════════════════════

- type: entity
  parent: BaseStructureDynamic
  id: SoulkillerConnector
  name: капсула С.У.И
  description: Криокапсула корпорации Tel-Adi. КПБ ложится внутрь, капсула закрывается — и сознание оператора переносится в оболочку С.У.И. Снаружи капсулу можно вскрыть, насильно разорвав контакт и выдернув оператора обратно в тело.
  suffix: ТелАди
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: Forge/Structures/Machines/soulkiller_pod.rsi
    layers:
    - state: "off"
      map: ["base"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SoulkillerConnectorVisuals.State:
        base:
          Open: { state: open }
          Closed: { state: "off" }
          Active: { state: "on" }
  # Капсула-хранилище: закрытие на КПБ подключает, открытие — насильно отключает.
  - type: EntityStorage
    open: false
    showContents: false
    openOnMove: false
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.48,-0.48,0.48,0.48"
        density: 100
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  # Связь с ядром Душегуба — только мультитулом (без авто-поиска ближайшего).
  - type: DeviceLinkSource
    ports:
    - SoulkillerLink
  - type: SoulkillerConnector