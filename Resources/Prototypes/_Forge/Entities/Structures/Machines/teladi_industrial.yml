# Промышленные машины Tel-Adi на стоковых базах (без Drake-зависимостей), фирменные текстуры.
# Платы — в Objects/Devices/Circuitboards/teladi_machines.yml,
# рецепты плат — в Recipes/Lathes/teladi_boards.yml.

# Переработчик лома Tel-Adi
- type: entity
  parent: ScrapProcessor
  id: TelAdiScrapProcessor
  name: переработчик лома Tel-Adi
  suffix: ТелАди
  components:
  - type: Sprite
    sprite: Forge/Structures/Machines/teladi_scrap_processor.rsi
  - type: Machine
    board: TelAdiScrapProcessorMachineCircuitboard
  - type: Lathe
    materialUseMultiplier: 0.75
    timeMultiplier: 0.5

# Центрифуга Tel-Adi — свой прототип (без Drake-parent), стоковые крафты, цена как у Drake
- type: entity
  parent: CentrifugeLatheMini
  id: TelAdiUraniumCentrifuge
  name: центрифуга Tel-Adi
  suffix: ТелАди
  components:
  # Forge-change: 2x2-база вшита, чтобы не зависеть от DrakeMachine2x2Base
  - type: Transform
    noRot: true
  - type: Construction
    graph: Machine2x2
    node: machine
    containers:
    - machine_parts
    - machine_board
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "1.25,0.25,-0.25,-1.25"
        density: 250
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    sprite: Forge/Structures/Machines/teladi_centrifuge.rsi
    offset: 0.5,-0.5
    snapCardinals: false
    layers:
    - state: icon
      map: [ "enum.LatheVisualLayers.IsRunning" ]
  - type: Machine
    board: TelAdiUraniumCentrifugeMachineCircuitboard
  # Стоковые паки наследуются от CentrifugeLatheMini (Mono*), Drake-паки убраны.
  - type: Lathe
    materialUseMultiplier: 0.75   # цена как у Drake
    timeMultiplier: 0.5           # цена как у Drake
    idleState: icon
    runningState: building

# Промышленный переработчик руды Tel-Adi (10 ёмкостей материи)
- type: entity
  parent: OreProcessorIndustrial
  id: OreProcessorIndustrialHeavy
  name: промышленный переработчик Tel-Adi
  description: Промышленный переработчик руды разработки корпорации Tel-Adi. Использует значительно меньше руды и работает быстрее стандартной модели.
  components:
  - type: Sprite
    sprite: Forge/Structures/Machines/ore_processor_industrial_heavy.rsi
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Machine
    board: OreProcessorIndustrialHeavyMachineCircuitboard
  - type: Lathe
    materialUseMultiplier: 0.5   # как Drake Mk2
    timeMultiplier: 0.25         # как Drake Mk2
    staticPacks:
    - OreSmelting
    - RGlassSmelting
    - AdvancedSmelting
