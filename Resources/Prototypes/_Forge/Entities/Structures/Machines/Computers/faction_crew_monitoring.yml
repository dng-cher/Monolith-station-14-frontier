- type: entity
  parent: [ComputerCrewMonitoring, BaseStructureDisableToolUse]
  id: ComputerCrewRenegadeMonitoring
  name: crew renegate monitoring console
  description: Used to monitor active health sensors built into most of the crew's renegate implants.
  suffix: Renegate
  components:
  - type: Sprite
    sprite: Forge/Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer_renegate
    - map: ["computerLayerKeyboard"]
      state: renegate_key
    - map: ["computerLayerScreen"]
      sprite: Forge/Structures/Machines/factions_crew_monitors_screens.rsi
      state: crew-renegate
    - map: ["computerLayerKeys"]
      state: ren_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewRenegadeMonitor

