#BsTransmitter
- type: entity
  name: bluespace energy transmitter T1
  description: Transmits energy via bluespace up to 1 MW.
  id: BsTransmitterT1
  parent: BsEnergyBase
  components:
  - type: BsTransmitterEnergy
    maxValue: 1000000
    maxConnected: 5
    stepSize: 50000
    enablePassiveIncome: false
  - type: Machine
    board: BsTransmitterCircuitboardT1
  - type: Sprite
    sprite: _Forge/BsEnergy/bsEnergy.rsi
    layers:
    - state: transmitter
      map: ["enabled"]
  - type: GenericVisualizer
    visuals:
      enum.BsEnergyVisuals.Enabled:
        enabled:
          True: {state: transmitter}
          False: {state: transmitterOff}
  - type: PowerConsumer
    voltage: High
    drawRate: 0
  - type: UserInterface
    interfaces:
      enum.BsEnergyUiKey.TransmitterKey:
        type: BsTransmitterBoundUserInterface
  - type: ActivatableUI
    key: enum.BsEnergyUiKey.TransmitterKey

