# base
- type: entity
  id: BsEnergyBase
  parent: [BaseStructure, ConstructibleMachine]
  abstract: true
  placement:
    mode: AlignTileAny
  components:
  - type: Sprite
  - type: Appearance
  - type: GenericVisualizer
  - type: Fixtures
    fixtures:
      fix1:
        layer:
        - MachineLayer
        - BulletImpassable
        - Opaque
  - type: Anchorable
  - type: InteractionOutline
  - type: PointLight
    enabled: false
    color: "#0000FF"
  - type: NodeContainer
    examinable: true
    nodes:
      hvPower:
        !type:CableDeviceNode
        nodeGroupID: HVPower
  - type: UserInterface
  - type: ActivatableUI
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

#BsReceiver
- type: entity
  name: bluespace energy receiver T1
  description: Receives energy via bluespace up to 1 MW.
  id: BsReceiverT1
  parent: BsEnergyBase
  components:
  - type: BsReceiverEnergy
    maxValue: 1000000
    stepSize: 50000
  - type: Machine
    board: BsReceiverCircuitboardT1
  - type: Sprite
    sprite: _Forge/BsEnergy/bsEnergy.rsi
    layers:
    - state: receiver
      map: ["enabled"]
  - type: GenericVisualizer
    visuals:
      enum.BsEnergyVisuals.Enabled:
        enabled:
          True: {state: receiver}
          False: {state: receiverOff}
  - type: PowerSupplier
    supplyRate: 0
  - type: UserInterface
    interfaces:
      enum.BsEnergyUiKey.ReceiverKey:
        type: BsReceiverBoundUserInterface
  - type: ActivatableUI
    key: enum.BsEnergyUiKey.ReceiverKey

- type: entity
  name: bluespace energy receiver T2
  description: Receives energy via bluespace up to 5 MW.
  id: BsReceiverT2
  parent: BsEnergyBase
  components:
  - type: BsReceiverEnergy
    maxValue: 5000000
    stepSize: 100000
  - type: Construction
    graph: Machine2x2
  - type: Machine
    board: BsReceiverCircuitboardT2
  - type: Sprite
    sprite: _Forge/BsEnergy/bsEnergy.rsi
    layers:
    - state: receiver
      map: ["enabled"]
    offset: 0.5, -0.5
    scale: 2, 2
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-1.45,1.45,0.45"
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
        - BulletImpassable
        - Opaque
  - type: GenericVisualizer
    visuals:
      enum.BsEnergyVisuals.Enabled:
        enabled:
          True: {state: receiver}
          False: {state: receiverOff}
  - type: PowerSupplier
    supplyRate: 0
  - type: UserInterface
    interfaces:
      enum.BsEnergyUiKey.ReceiverKey:
        type: BsReceiverBoundUserInterface
  - type: ActivatableUI
    key: enum.BsEnergyUiKey.ReceiverKey

