- type: entity
  id: RenegateIDPrinter
  parent: BaseLatheLube
  name: renegate ID printer
  description: a printer that produces ID cards and Renegade encryption keys.
  suffix: Ренегаты
  components:
  - type: Sprite
    sprite: Forge/Structures/Machines/idprinter.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: RenegateIDPrinterCircuitboard
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - RenegateIDStatic
    - RenegateHeadsetStatic
    - Bureaucracytatic


