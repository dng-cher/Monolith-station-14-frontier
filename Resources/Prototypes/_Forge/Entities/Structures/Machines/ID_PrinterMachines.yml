#   Boards

- type: entity
  id: RenegateIDPrinterCircuitboard
  parent: BaseMachineCircuitboard
  name: Renegate ID printer board
  description: A machine printed circuit board for an Renegate ID printer.
  components:
    - type: MachineBoard
      prototype: RenegateIDPrinter
      requirements:
        MatterBin: 3
        Manipulator: 4
      stackRequirements:
        Glass: 5


