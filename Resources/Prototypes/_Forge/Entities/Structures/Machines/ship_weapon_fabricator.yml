- type: entity
  id: ShipWeaponFabricator
  parent: [BaseMachinePowered, ConstructibleMachine]
  name: naval weapon fabricator
  description: An industrial assembly machine for building ship weapons from researched blueprints and loaded components.
  components:
  - type: Sprite
    sprite: Forge/Structures/Machines/shipWeaponFab.rsi
    offset: 1,-1
    layers:
    - state: base
    - state: screen
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      shader: unshaded
    - state: packing
      map: ["fabricating"]
      visible: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "2.25,0.25,-0.25,-2.25"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
      enum.ShipWeaponFabricatorVisuals.Fabricating:
        fabricating:
          True: { visible: true }
          False: { visible: false }
  - type: Appearance
  - type: ApcPowerReceiver
    powerLoad: 150000
  - type: Machine
    board: ShipWeaponFabricatorCircuitboard
  - type: ShipWeaponFabricator
    boardWhitelist:
      components:
      - ShipWeaponBoard
    maxBoardQueue: 8
    powerLoadIdle: 1500
    powerLoadActive: 12000
    outputFlatpackPrototype: ForgeShipWeaponFlatpack
  - type: ActivatableUI
    key: enum.ShipWeaponFabricatorUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.ShipWeaponFabricatorUiKey.Key:
        type: ShipWeaponFabricatorBoundUserInterface
  - type: WiresPanel
  - type: WiresVisuals
  - type: AmbientSound
    enabled: false
    volume: 4
    range: 3
    sound:
      path: /Audio/Items/rped.ogg
  - type: MaterialStorage
    storageLimit: 9000000
    canEjectStoredMaterials: true # Forge-Change: allow manual resource extraction from fabricator
    whitelist:
      tags:
      - Sheet
      - RawMaterial
      - Ingot
      - Ore
  - type: OreSiloClient
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      weapon_board: !type:Container
      weapon_parts: !type:Container
  - type: Construction
    graph: Machine3x3
    containers:
    - machine_parts
    - machine_board
    - weapon_board
    - weapon_parts
