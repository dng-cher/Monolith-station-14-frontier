- type: entity
  parent: PortableGeneratorJrPacman
  name: generator-goblin-name
  description: generator-goblin-desc
  id: PortableGeneratorClunker
  suffix: Welding Fuel, Alcohol, 5 kW
  components:
    - type: Sprite
      sprite: Forge/Structures/Power/generation.rsi
      layers:
        - state: clunker
          map: [ "enum.GeneratorVisualLayers.Body" ]
        - state: clunker_sparkle
          map: [ "enum.GeneratorVisualLayers.Unlit" ]
          shader: unshaded
          visible: false
    - type: GenericVisualizer
      visuals:
        enum.GeneratorVisuals.Running:
          enum.GeneratorVisualLayers.Body:
            True: { state: clunker_on_lit }
            False: { state: clunker }
          enum.GeneratorVisualLayers.Unlit:
            True: { visible: true }
            False: { visible: false }
    - type: GoblinMade
    - type: Machine
      board: PortableGeneratorClunkerCircuitboard
    - type: FuelGenerator
      targetPower: 6000 # Frontier - 2000<6000
      minTargetPower: 1000
      optimalPower: 6000 # Frontier - 2000<6000
      maxTargetPower: 20000 # Mono
      # 30~ minutes at full tank.
      optimalBurnRate: 0.11111111
      # Shallow curve
      fuelEfficiencyConstant: 0.3
    # All kind flammable Alcohol and welding fuel can be fueled.
    - type: ChemicalFuelGeneratorAdapter
      solution: tank
      reagents:
