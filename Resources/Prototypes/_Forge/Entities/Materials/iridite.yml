    sprite: _Mono/Objects/Materials/fissiles.rsi
    state: uranium_3
    layers:
    - state: uranium_3
      map: ["base"]
  - type: Tag
    tags:
    - Sheet
  - type: Item
    sprite: _Mono/Objects/Materials/fissiles.rsi
    heldPrefix: uranium
  - type: Stack
    stackType: IridiumMatrix
    count: 10
    baseLayer: base
    layerStates:
    - uranium
    - uranium_2
    - uranium_3
  - type: Material
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      IridiumMatrix: 100

- type: entity
