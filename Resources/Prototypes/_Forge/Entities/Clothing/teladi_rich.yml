    sprite: Forge/Clothing/Uniforms/Jumpsuits/teladi_rich.rsi
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        sprite: Forge/Clothing/Uniforms/Jumpsuits/teladi_rich.rsi
      right:
      - state: inhand-right
        sprite: Forge/Clothing/Uniforms/Jumpsuits/teladi_rich.rsi

