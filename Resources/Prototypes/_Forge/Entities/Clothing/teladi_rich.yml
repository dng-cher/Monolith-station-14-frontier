# Комбинезон
- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformJumpsuitTelAdiRich
  name: 'деловой комбинезон Tel-Adi'
  description: Деловой комбинезон среднего класса корпорации Tel-Adi. Для тех, кто уже сделал первые инвестиции.
  suffix: ТелАди Средний
  components:
  - type: Sprite
    sprite: Forge/Clothing/Uniforms/Jumpsuits/teladi_rich.rsi
