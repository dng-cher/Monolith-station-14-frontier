- type: entity
  parent: [ClothingHeadHardsuitBase, BaseToggleClothing, PowerCellSlotSmallItem]
  id: ClothingHeadHelmetHardsuitHVStealh
  name: HV MP-33R «Imperceptible» helmet
  description: Higaris Victories' military prototype 33R, codenamed «Imperceptible».
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/empire_stealh.rsi
  - type: Clothing
    sprite: Forge/Clothing/Head/Hardsuits/empire_stealh.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: NightVision
    relayOverlay: true
    goggleEffect: true
    action: ActionToggleNightVision
    viewCircleRadius: 400
    viewCircleCount: 2
