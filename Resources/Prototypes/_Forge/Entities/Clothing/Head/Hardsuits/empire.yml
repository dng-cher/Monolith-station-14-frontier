      passiveVisibilityRate: -0.2
      movementVisibilityRate: 0
  - type: UseDelay
    delay: 2
  - type: PowerCellDraw
    drawRate: 2
  - type: ToggleCellDraw
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
