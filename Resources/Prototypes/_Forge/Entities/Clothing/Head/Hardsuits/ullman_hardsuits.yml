- type: entity
  parent: [ClothingHeadHardsuitBase, ShowMedicalIcons]
  id: ClothingHeadHelmetHardsuitUllmanMedical
  name: ullman medical hardsuit helmet
  description: The medical hardsuit helmet is used by the Ullman Industries medical staff.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/ui_med_hardsuit_helm.rsi
  - type: Clothing
    sprite: Forge/Clothing/Head/Hardsuits/ui_med_hardsuit_helm.rsi
  - type: PointLight
    color: "#4e88a6"
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: NightVision
    relayOverlay: true
    goggleEffect: true
    action: ActionToggleNightVision
    viewCircleRadius: 400
    viewCircleCount: 2
    viewCircleSpacing: 280
    phosphorColor: "#00FF00"
    lightingColor: "#FFFFFF32"

  - type: RadarConsole
    followEntity: true
    noRotate: true
  - type: ActivatableUI
    key: enum.RadarConsoleUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.RadarConsoleUiKey.Key:
        type: RadarConsoleBoundUserInterface
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
  - type: HideLayerClothing
    slots:
    - Hair
    - Special
    - FacialHair
    - Snout
    - Head
    - HeadTop
    - HeadSide