- type: entity
  parent: [ClothingBeltBase, ClothingSlotBase]
  id: OdatiSheath
  name: Ножы одати
  description: Ножны предназначенные для одати
  components:
  - type: Sprite
    sprite: _Forge/OniMeleeWeapons/Odati/odatiSheathItem.rsi
    state: sheath
  - type: Clothing
    sprite: _Forge/OniMeleeWeapons/Odati/odatiSheath.rsi
  - type: ItemSlots
    slots:
      item:
        name: Sabre
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - Odati
  - type: ItemMapper
    mapLayers:
      sheath-sabre:
        whitelist:
          tags:
          - Odati
  - type: Appearance

