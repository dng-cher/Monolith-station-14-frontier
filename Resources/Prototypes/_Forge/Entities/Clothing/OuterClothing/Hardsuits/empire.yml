#region AC Prototype 2
- type: entity
  parent: [ClothingOuterHardsuitBase, BaseFactionGearOtherFactionT2]
  id: ClothingOuterHardsuitHVp2
  name: AC Prototype 2 hardsuit
  description: A hardsuit issued to Imperial guardian operating in low-pressure and high-risk environments. Specialized in bullet protection.
  components:
  - type: Sprite
    sprite: Forge/Clothing/OuterClothing/Hardsuits/empirelight.rsi
  - type: Item
    size: Huge
  - type: Clothing
    sprite: Forge/Clothing/OuterClothing/Hardsuits/empirelight.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.65
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.5
        Heat: 0.6
        Radiation: 0.55
        Caustic: 0.6
  - type: StaminaDamageResistance
    coefficient: 0.25
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: SpaceFlightProfile
    thrustMultiplier: 0.85
    controlMultiplier: 1.05
    fuelUsageMultiplier: 1.25
    combatStabilityBonus: 0.05
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingHeadHelmetHardsuitHVp2
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock
  - type: StaticPrice
    price: 17800
    vendPrice: 8500

