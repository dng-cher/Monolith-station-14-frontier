# region Empire
- type: entity
  parent: [ ClothingOuterStorageFoldableBase ]
  id: ClothingOuterCoatEmpireWindbreaker
  name: empire guardian windbreaker
  description: Windbreaker for empire guardians
  components:
  - type: Sprite
    sprite: Forge/Clothing/OuterClothing/Coats/empirewindbreaker.rsi
  - type: Clothing
    sprite: Forge/Clothing/OuterClothing/Coats/empirewindbreaker.rsi
  - type: Armor
    modifiers: {}
  - type: ExplosionResistance
    damageCoefficient: 0.75
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:Container
        ents: []
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadEmpireWBHood
    requiredSlot:
    - OUTERCLOTHING
    slot: head

