# Шлем-противогаз Tel-Adi Moonlight (фонарик на сменной батарейке)
- type: entity
  parent: [ClothingMaskGasSecurity, PowerCellSlotSmallItem]
  id: ClothingMaskGasMoonlight
  name: 'шлем-противогаз Tel-Adi'
  description: Рабочий шлем-противогаз корпорации Tel-Adi Встроенный фонарик работает от сменной батарейки.
  suffix: ТелАди
  components:
  - type: Sprite
    sprite: Forge/Clothing/Mask/moonlight.rsi
  - type: Clothing
    sprite: Forge/Clothing/Mask/moonlight.rsi
  - type: HideLayerClothing
    slots:
    - Hair
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        sprite: Forge/Clothing/Mask/moonlight.rsi
      right:
      - state: inhand-right
        sprite: Forge/Clothing/Mask/moonlight.rsi
  - type: PointLight
    enabled: false
    radius: 10
    energy: 4
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: true
  - type: HandheldLight
    addPrefix: true
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        interpolate: Linear
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        startValue: 0.1
        endValue: 2.0
        isLooped: true
  - type: PowerCellDraw
    drawRate: 1.5
  - type: ToggleCellDraw
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmall
        whitelist:
          components:
          - PowerCell
