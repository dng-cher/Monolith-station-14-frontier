# Комбинезон Tel-Adi
- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformJumpsuitMoonlight
  name: 'комбинезон Tel-Adi'
  description: Рабочий комбинезон корпорации Tel-Adi. Выдаётся шахтёрам и рядовым сотрудникам.
  suffix: ТелАди
  components:
  - type: Sprite
    sprite: Forge/Clothing/Uniforms/Jumpsuits/moonlight.rsi
  - type: Clothing
    sprite: Forge/Clothing/Uniforms/Jumpsuits/moonlight.rsi
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        sprite: Forge/Clothing/Uniforms/Jumpsuits/moonlight.rsi
      right:
      - state: inhand-right
        sprite: Forge/Clothing/Uniforms/Jumpsuits/moonlight.rsi

