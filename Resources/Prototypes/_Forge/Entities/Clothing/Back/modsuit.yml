- type: entity
  parent: [Clothing, ContentsExplosionResistanceBase]
  id: ClothingModsuitVanguardNexus
  name: vanguard hardsuit control unit
  description: A modular hardsuit control module unit equipped with enhanced actuators in the legs to allow for rapid assault or retreat actions.
  suffix: Нексус
  components:
  - type: StaticPrice
    price: 4500
    vendPrice: 15000
  - type: Appearance
  - type: Sprite
    sprite: Forge/Clothing/Back/Modsuits/nexusmod.rsi
    layers:
    - state: control
    - state: control-sealed
      visible: false
      shader: unshaded
      map: [ "sealed" ]
  - type: Item
    size: Huge
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: Storage
    grid:
    - 0,0,1,3
    - 3,0,6,3
    - 8,0,9,3
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:Container
      cell_slot: !type:ContainerSlot
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
  - type: UseDelay
    delay: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: ToggleableClothing
    requiredSlot: back
    blockUnequipWhenAttached: true
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingModsuitHelmetVanguardNSC
      gloves: ClothingModsuitGauntletsVanguardNSC
      outerClothing: ClothingModsuitChestplateVanguardNSC
      shoes: ClothingModsuitBootsVanguardNSC
  - type: WiresPanel
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        whitelist:
          components:
            - PowerCell
  - type: ItemSlotsRequirePanel
    slots:
      cell_slot: true
  - type: PowerCellDraw
    drawRate: 0.1 # Sealed draw rate
    useRate: 0.5 # Draw rate for sealing
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: false
  - type: DoAfter
  - type: SealableClothingControl
  - type: SealableClothingRequiresPower
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      back:
      - state: equipped-BACKPACK-sealed
      back-resomi:
      - state: equipped-BACKPACK-sealed-resomi

- type: entity
  parent: ClothingModsuitVanguardNexus
  id: ClothingModsuitVanguardNexusPowerCell
  suffix: Нексус, Батарейка высокой ёмкости
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHigh
        whitelist:
          components:
            - PowerCell

