- type: entity
  id: BaseMeleeWeaponEnergyTL # more generic naming in case someone makes like, idk, an energy axe
  parent: EnergySword
  categories: [ HideSpawnMenu ]
  abstract: true
  components:
  - type: WeaponCaseInsertable # Frontier
  - type: EnergySword
  - type: ItemToggle
    soundActivate:
      path: /Audio/Weapons/ebladeon.ogg
    soundDeactivate:
      path: /Audio/Weapons/ebladeoff.ogg
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Weapons/ebladehum.ogg
  - type: ComponentToggler
    components:
    - type: Sharp
    - type: DisarmMalus
      malus: 0.6
    - type: Execution
      doAfterDuration: 4.0
  - type: ItemToggleHot
  - type: ItemToggleSize
    activatedSize: Huge
  - type: ItemTogglePointLight
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        variation: 0.125
    activatedDamage:
      types:
        Slash: 32
        Structural: 50
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Slash: 15
        Structural: 20
  - type: Item
    size: Small
  - type: UseDelay
    delay: 1.0
  - type: PointLight
    enabled: false
    radius: 2
    energy: 2
    color: white
    netsync: false
  - type: Appearance
  - type: ToggleableLightVisuals # Add support for multiple layers
    spriteLayer: blade
    inhandVisuals:
      left:
      - state: inhand-left-blade
        shader: unshaded
      right:
      - state: inhand-right-blade
        shader: unshaded
  - type: Reflect
  - type: IgnitionSource
    temperature: 700

- type: entity
  name: energy sword
  parent: [BaseMeleeWeaponEnergyTL, BaseC3SyndicateContraband]
  id: BaseEnergySwordTL
  categories: [ HideSpawnMenu ]
  description: A very loud & dangerous sword with a beam made of pure, concentrated plasma. Cuts through unarmored targets like butter.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/e_sword.rsi
    layers:
    - state: e_sword
    - state: e_sword_blade
      color: "#FFFFFF"
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: Item
    sprite: Objects/Weapons/Melee/e_sword-inhands.rsi

- type: entity
  name: опытный образец 4
  parent: [BaseC3SyndicateContraband, BaseEnergySwordTL]
  id: EnergySwordTL
  description: На первый взгляд неприметный пласталевый клинок, с парой кнопок на рукояти.
  components:
  - type: Sprite
    sprite: Forge/Objects/Weapons/Melee/tl_e_sword.rsi
# region WIP
    layers:
    - state: e_sword
    - state: e_sword_blade
      color: "#FFFFFF"
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: Item
    sprite: Forge/Objects/Weapons/Melee/tl_e_sword-inhands.rsi
  - type: EnergySword
    colorOptions:
      - "#ebf0e9"
    blockHacking: true

- type: entity
  parent: [ BaseCentcommContraband, EnergySword ]
  id: EnergySwordBlue
  suffix: MSF, blue
  components:
  - type: EnergySword
    colorOptions:
    - "#2288ff" # can only be blue

- type: entity
  parent: BaseMeleeWeaponEnergy
  id: WeaponPhaseBladeForge
  name: nano-laminate phaseblade
  description: A heavy bladed weapon with a wicked edge, commonly seen in the hands of pre-fracture warriors. Can be activated to adjust to combat needs
  suffix: Forge
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Melee/phaseblade.rsi
    layers:
    - state: e_sword
    - state: e_sword_blade
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: PointLight
    enabled: false
    radius: 2
    energy: 2
    color: "#c24fd1"
    netsync: false
  - type: Item
    sprite: _Mono/Objects/Weapons/Melee/phaseblade.rsi
    size: Huge
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Melee/phaseblade.rsi
    quickEquip: false
    slots:
    - Back
    - Belt
    - SuitStorage
    whitelist:
      tags:
        - AsakimBrain
    whitelistCheckOrgans: true
  - type: ComponentToggler
    components:
    - type: Reflect
      reflectProb: 0.3
  - type: ItemToggleSize
    activatedSize: Huge
  - type: ItemToggle
    whitelist:
      tags:
        - AsakimBrain
      components:
        - BorgChassis
    whitelistCheckOrgans: true
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        variation: 0.125
    activatedDamage:
      types:
        Slash: 25
        Caustic: 25
        Heat: 25
        Structural: 200
  - type: MeleeWeapon
    heavyStaminaCost: 1
    wideAnimationRotation: -135
    attackRate: 1.25
    damage:
      types:
        Slash: 45
        Structural: 100
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Sharp
  - type: DisarmMalus
    malus: 0.6
  - type: Execution
    doAfterDuration: 4.0
