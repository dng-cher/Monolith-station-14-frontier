- type: entity
  name: Одати
  parent: BaseSword
  id: Odati
  description: Традиционный японский длинный меч
  components:
  - type: Wieldable
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/sabre_drop.ogg
  - type: Sprite
    sprite: _Forge/OniMeleeWeapons/Odati/odatiItem.rsi
  - type: MeleeWeapon
    heavyStaminaCost: 5 # goob edit
    attackRate: 1
    range: 2.5
    damage:
      types:
        Slash: 45
        Structural: 30
        Bloodloss: 50
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: 0.05
    spread: 90
  - type: Item
    sprite: _Forge/OniMeleeWeapons/Odati/odati.rsi
  - type: Tag
    tags:
    - Odati
  - type: DisarmMalus
    malus: 0.3
  - type: Clothing
    sprite: _Forge/OniMeleeWeapons/Odati/odati.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage
  - type: SpeciesWield
    exemptSpecies:
    - Oni
  - type: SpeciesMeleeDamage
    exemptSpecies:
    - Oni
    damageMultiplier: 0.5

