- type: entity
  abstract: true
  parent: BaseItem
  id: BaseAmmoBox5x23mm
  name: large ammunition box (5x23mm caseless)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - Cartridge5x23mm
    proto: Cartridge5x23mm
    capacity: 144
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/6.35x40mm_caseless.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg

- type: entity
  parent: BaseAmmoBox5x23mm
  id: AmmoBox5x23mmNexus
  name: large ammunition box (5x23mm caseless)
  description: Caseless ammunition for the NEX-SMG-4 Shebet.
