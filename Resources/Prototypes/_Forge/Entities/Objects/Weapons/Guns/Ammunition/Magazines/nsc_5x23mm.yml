      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: BaseMagazine5x23mm
  id: Magazine5x23mmNexus
  name: SMG magazine (5x23mm caseless)
  description: Extended magazine for the Shebet SMG.
