    - Magazine5x23mm
  - type: Item
    size: Small
    shape:
    - 0,0,1,1
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - Cartridge5x23mm
    proto: Cartridge5x23mm
