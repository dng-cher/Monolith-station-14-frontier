- type: entity
  name: kunisa-pattern plasma autopulser
  parent: [BaseWeaponBattery, BaseGunWieldable]
  id: WeaponRifleAsakimAutopulserForge
  description: An advanced handheld plasma rifle. The design bears similarities to pre-fracture plasma weapons.
  suffix: Forge
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Battery/asakimrifle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/flamer_mouse.rsi
      state: all
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Battery/asakimrifle.rsi
    whitelist:
      tags:
        - AsakimBrain
    whitelistCheckOrgans: true
  - type: GunWieldBonus
    minAngle: -18
    maxAngle: -14
  - type: Item
    size: Huge
  - type: Gun
    projectileSpeed: 50
    minAngle: 18
    maxAngle: 26
    fireRate: 6
    burstFireRate: 15
    shotsPerBurst: 5
    burstCooldown: 1
    selectedMode: Burst
    availableModes:
    - Burst
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_svalinn.ogg
    whitelist:
      tags:
        - AsakimBrain
    whitelistCheckOrgans: true
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: false
  - type: ProjectileBatteryAmmoProvider
    proto: HandheldAutopulserProjectile
    fireCost: 25
  - type: Appearance
  - type: StaticPrice
    price: 1750
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 35

