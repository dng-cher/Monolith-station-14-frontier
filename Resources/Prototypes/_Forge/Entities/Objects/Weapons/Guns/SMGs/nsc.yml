- type: entity
  name: NEX-SMG-4 Shebet (5x23mm)
  parent: [ForgeBaseWeaponFrameSubMachineGunNanotrasen, BaseGunWieldable]
  id: WeaponSubMachineGunNexusShebet
  suffix: Нексус
  description: Suppressed PDW in 5x23mm caseless. Extended 48-round magazines. Can fire one-handed, but spread is severe; wield for accurate fire.
  components:
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/SMGs/nexus_bal_smg.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Forge/Objects/Weapons/Guns/SMGs/nexus_bal_smg_inhand_x64.rsi
  - type: Item
    size: Large
    sprite: Forge/Objects/Weapons/Guns/SMGs/nexus_bal_smg_inhand_x64.rsi
    shape:
    - 0,0,3,1
  - type: GunWieldBonus
    minAngle: -38
    maxAngle: -55
    angleIncrease: -10
    angleDecay: 10
  - type: Gun
    minAngle: 38
    maxAngle: 58
    angleIncrease: 14
    angleDecay: 6
    fireRate: 9
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mla_fire.ogg
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5x23mmNexus
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine5x23mm
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge5x23mm
        priority: 1
        whitelist:
          tags:
          - Cartridge5x23mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
