#BsTransmitter Board
- type: entity
  id: BsTransmitterCircuitboardT1
  parent: BaseMachineCircuitboard
  name: bluespace transmitter board T1
  description: bluespace transmitter board T1
  components:
  - type: MachineBoard
    prototype: BsTransmitterT1
    frameSize: 1x1
    componentRequirements:
      AmeFuelContainer:
        amount: 3
        defaultPrototype: AmeJar
    stackRequirements:
      Steel: 20
      Glass: 20
      Gold: 20
      Silver: 20
      UraniumFissile: 2
      Diamond: 1
      Bluespace: 1

