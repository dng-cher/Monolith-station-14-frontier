#region Renegate
- type: entity
  parent: BaseShipLPCOneUse
  id: ShipVoucherAzimut
  name: Renegate Azimut LPC
  suffix: Ренегаты
  description: A small card that contains the data for the procurement of a Azimut-class destroyer from the flagship's reserves.
  components:
  - type: Sprite
    sprite: Forge/Misc/voucher.rsi
    layers:
    - state: voucherenegat
  - type: ShipyardVoucher
    destroyOnEmpty: true
    consoleType: Renegate
    companyName: Renegate
    vessels:
    - azimut
  - type: StaticPrice
    vendPrice: 530000

