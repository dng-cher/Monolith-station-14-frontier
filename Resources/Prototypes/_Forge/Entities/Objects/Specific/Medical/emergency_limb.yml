# Аварийный имплант-конечность Tel-Adi.
# Берёшь в руку → активируешь (загорается прижигалка) → тыкаешь по телу.
# Если конечности нет — вваривает грубый протез на её место, нанося ожог.
- type: entity
  parent: BaseItem
  id: EmergencyLimbImplant
  name: аварийный имплант-конечность
  description: Грубое устройство экстренной замены конечностей Tel-Adi. Активируй встроенную прижигалку и приложи к месту утраченной руки или ноги — протез вваривается прямо в культю.
  suffix: ТелАди
  components:
  - type: Sprite
    sprite: Forge/Objects/Specific/Medical/emergency_limb.rsi
    layers:
    - state: icon_off
    - state: icon_on
      visible: false
      shader: unshaded
      map: ["enum.ToggleableVisuals.Layer"]
  - type: Item
    size: Small
    sprite: Forge/Objects/Specific/Medical/emergency_limb.rsi
  - type: EmergencyLimbImplant
    damage:
      types:
        Heat: 10
  - type: ItemToggle
    soundActivate:
      collection: WelderOn
      params:
        volume: -6
    soundDeactivate:
      collection: WelderOff
      params:
        volume: -6
  - type: ItemToggleHot
  - type: ToggleableVisuals
    spriteLayer: icon_on
    inhandVisuals:
      left:
      - state: inhand-left-on
        shader: unshaded
      right:
      - state: inhand-right-on
        shader: unshaded
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: Appearance
  - type: PointLight
    enabled: false
    radius: 1.0
    color: "#ff3a2f"
    netsync: false
  - type: ItemTogglePointLight
  - type: StaticPrice
    price: 200
