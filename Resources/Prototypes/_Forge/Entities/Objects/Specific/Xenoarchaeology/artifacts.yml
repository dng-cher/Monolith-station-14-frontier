- type: entity
  parent: BaseXenoArtifact
  id: ForgeContractStudyArtifactEasy
  name: simple contract artifact
  description: A controlled artifact prepared for simple Forge study contracts.
  suffix: Forge, Study Contract, Easy
  components:
  - type: Artifact
  - type: CargoSellBlacklist
  - type: RandomArtifactSprite
    maxSprite: 36
  - type: RandomSprite
    available:
    - enum.ArtifactsVisualLayers.Effect:
        ano01_on: Rainbow
  - type: Appearance
  - type: ForgeArtifactStudyPreset
    nodeCountMin: 3
    nodeCountMax: 4
    excludedEffects:
    - EffectBoom
    - EffectSingulo
    - EffectTesla
    - EffectPhasing

