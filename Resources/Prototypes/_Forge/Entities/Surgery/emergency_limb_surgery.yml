# Операция: вживить аварийный имплант в туловище (для механики отращивания).
# Требует вскрытую грудную клетку (SurgeryOpenIncision), инструмент — сам имплант.
# bodyAdd добавляет компонент-носитель — это и делает шаг «незавершённым» пока имплант не вставлен.

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepImplantEmergencyLimb
  name: Вживить аварийный имплант
  categories: [ HideSpawnMenu ]
  components:
  - type: SurgeryStep
    tool:
    - type: EmergencyLimbImplant
    duration: 6
    bodyAdd:
    - type: EmergencyLimbRegrower
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/manipulation.rsi
    state: insertion
  - type: SurgeryImplantEmergencyLimbStep

- type: entity
  parent: SurgeryBase
  id: SurgeryImplantEmergencyLimb
  name: Вживление аварийного импланта
  categories: [ HideSpawnMenu ]
  components:
  - type: Surgery
    requirement: SurgeryOpenIncision
    steps:
    - SurgeryStepImplantEmergencyLimb
    - SurgeryStepSealWounds
  - type: SurgeryPartCondition
    part: Torso
