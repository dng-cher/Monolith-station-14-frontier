- type: entity
  name: asakim warrior spawner
  id: SpawnMobAsakimWarrior
  suffix: Forge
  parent: MarkerBase
  components:
  - type: ConditionalSpawner
    prototypes:
    - MobAsakimWarrior
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: _Mono/Mobs/Species/Asakim/parts.rsi
      state: full

- type: entity
  parent: MobAsakim
  id: MobAsakimWarrior
  name: asakim warrior
  suffix: Asakim
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: Loadout
    prototypes: [AsakimWarriorGear]
  - type: GhostRole
    name: ghost-role-information-asakim-name
    description: ghost-role-information-asakim-description
    rules: ghost-role-information-asakim-rules
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 540000 # 150 hours
    - !type:DepartmentTimeRequirement
      department: Renegates
      time: 90000 # 25 hours
    - !type:DepartmentTimeRequirement
      department: TSF
      time: 90000 # 25 hours
    - !type:DepartmentTimeRequirement
      department: Empire
      time: 90000 # 25 hours
    - !type:DepartmentTimeRequirement
      department: Civilian
      time: 180000 # 50 hours
  - type: GhostTakeoverAvailable
  - type: RandomMetadata
    nameSegments:
    - "Юнит"
    - SyndicateNamesNormal
  - type: NpcFactionMember
    factions:
    - SyndicateNF
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical
      200: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      100: 0.9
      135: 0.6
  - type: Stamina
    critThreshold: 250
  - type: SurgerySpeedModifier
    speedModifier: 1.2
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Remnants
  - type: ActiveRadio
    channels:
    - Remnants
  - type: AutoImplant
    implants:
    - FreedomImplant
    - BluespaceLifelineImplant
  - type: Access
    tags:
    - SyndicateAgent
    - Remnant
    - Mercenary
  - type: LanguageKnowledge
    speaks:
    - Azaziba
    - Draconic
    understands:
    - Draconic
    - Azaziba
    - RobotTalk
    - DroneTalk

- type: startingGear
  id: AsakimWarriorGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitNinja
    back: ClothingBackpackSatchelAsakim
    gloves: ClothingHandsGlovesCombat
    outerClothing: ClothingOuterHardsuitAsakimUnremoveableForge
    shoes: ClothingShoesBootsMagAsakimForge
    pocket1: SyringeCaseNaniteFilled
    pocket2: DoubleEmergencyOxygenTankFilled
    belt: WeaponPhaseBladeForge
    suitstorage: WeaponRifleAsakimAutopulserForge
  storage:
    back:
    - DoubleEmergencyOxygenTankFilled
    - HandHeldMassScannerBorg
    - PowerDrill
    - JawsOfLife
    - WelderExperimental
    - ShipRepairDeviceRedacted
    - WeaponRifleAsakimPistolForge
    - InfectionScannerAsakim
    - PillCanisterMesotaxinide
