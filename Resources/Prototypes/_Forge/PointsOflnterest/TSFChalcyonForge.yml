- type: pointOfInterest
  id: TSFMCHalcyon
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Флагман ТСФ «Халкион»'
  minimumDistance: 4500 # Mono
  maximumDistance: 5500 # Mono
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed ]
  spawnGroup: Required
  placementTags: [ TSF ] # Forge-Change
  minDistanceFromTags: # Forge-Change
    Renegates: 5000
    Imperial: 5000
  gridPath: /Maps/_Forge/POI/TSFChalcyonForge.yml
  addComponents:
  - type: IFF
    color: "#047abd"
    readOnly: true
  - type: Company # Forge-Change
    companyName: TSF
  - type: PoiCaptureRoundstart # Forge-Change
    ownerCompanyId: TSF
    ownerFactionId: TSF
    zoneRadius: 2048
  - type: SolarPoweredGrid
    doNotCull: true
  - type: ProtectedGrid # Forge-Change
    preventTeleportation: true

- type: gameMap
  id: TSFMCHalcyon
  mapName: 'Флагман ТСФ «Халкион»'
  mapPath: /Maps/_Forge/POI/TSFChalcyonForge.yml
  minPlayers: 0
  randomRotation: false
  stations:
    TSFMCHalcyon:
      stationProto: SecurityFrontierOutpost
      gridComponents:
      - type: VesselInfo
        description: "Законсервированный линкор, переделанный в передовую базу, — штаб операций ТСФ."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Флагман ТСФ «Халкион»'
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Decoration/banner.rsi
            state: nfsd-banner
          stationSubtext: 'frontier-lobby-nfsd-subtext'
          stationDescription: 'frontier-lobby-nfsd-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            #Forge Change
            TsfCommandingOfficer: [ 1, 1 ]
            TsfExecutiveOfficer: [ 1, 1 ]
            TsfSeniorOfficer: [ 1, 1 ]
            TsfSeniorAide: [ 2, 2 ]
            TsfAmbassador: [ 1, 1 ]
            TsfRanger: [ -1, -1 ]
            TsfRecruit: [ -1, -1 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropReporting
          messageSet: Nfsd
        - type: StationDeadDropHintExempt

