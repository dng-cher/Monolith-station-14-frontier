# ══════════════════════════════════════════════════════════
# Аварийная конечность Tel-Adi — ставится имплантом на месте утраченной.
# Работает, но статы хуже обычной. Текстуры объединённые (рука+кисть / нога+ступня):
# объединённый спрайт рисуется на слое РУКИ/НОГИ (он под одеждой), а слой КИСТИ/СТУПНИ
# прозрачный — иначе кисть рисуется поверх одежды и рука торчит из рукава.
# При 50+ суммарного урона конечность разрушается.
# ══════════════════════════════════════════════════════════

# --- On-body sprite layers ---
- type: humanoidBaseSprite
  id: MobEmergencyLArm
  baseSprite:
    sprite: Forge/Mobs/Species/EmergencyLimb/emergency_limb.rsi
    state: l_arm

- type: humanoidBaseSprite
  id: MobEmergencyRArm
  baseSprite:
    sprite: Forge/Mobs/Species/EmergencyLimb/emergency_limb.rsi
    state: r_arm

- type: humanoidBaseSprite
  id: MobEmergencyLLeg
  baseSprite:
    sprite: Forge/Mobs/Species/EmergencyLimb/emergency_limb.rsi
    state: l_leg

- type: humanoidBaseSprite
  id: MobEmergencyRLeg
  baseSprite:
    sprite: Forge/Mobs/Species/EmergencyLimb/emergency_limb.rsi
    state: r_leg

# Transparent layer for hands/feet so they don't draw over clothing.
- type: humanoidBaseSprite
  id: MobEmergencyBlank
  baseSprite:
    sprite: Forge/Mobs/Species/EmergencyLimb/emergency_limb.rsi
    state: blank

# --- Base (listed FIRST in parents, like cybernetics, so its Silicon/Destructible apply) ---
- type: entity
  abstract: true
  parent: BasePartInorganic
  id: EmergencyLimbPartBase
  components:
  - type: Sprite
    sprite: Forge/Mobs/Species/EmergencyLimb/emergency_limb.rsi
  - type: Icon
    sprite: Forge/Mobs/Species/EmergencyLimb/emergency_limb.rsi
  - type: Damageable
    damageContainer: Silicon
  - type: EmergencyLimbPart
  # Crude emergency build: the WHOLE limb (arm+hand / leg+foot) crumbles at 50 total damage,
  # with no stump leftovers, and the body texture resets.
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmergencyLimbCrumbleBehavior { }

# --- Hands / feet (children, auto-generated by the arm/leg) ---
- type: entity
  parent: [EmergencyLimbPartBase, BaseLeftHand]
  id: EmergencyLeftHand
  name: аварийная левая кисть
  components:
  - type: Sprite
    state: l_arm
  - type: Icon
    state: l_arm
  - type: BodyPart
    baseLayerId: MobEmergencyBlank

- type: entity
  parent: [EmergencyLimbPartBase, BaseRightHand]
  id: EmergencyRightHand
  name: аварийная правая кисть
  components:
  - type: Sprite
    state: r_arm
  - type: Icon
    state: r_arm
  - type: BodyPart
    baseLayerId: MobEmergencyBlank

- type: entity
  parent: [EmergencyLimbPartBase, BaseLeftFoot]
  id: EmergencyLeftFoot
  name: аварийная левая ступня
  components:
  - type: Sprite
    state: l_leg
  - type: Icon
    state: l_leg
  - type: BodyPart
    baseLayerId: MobEmergencyBlank

- type: entity
  parent: [EmergencyLimbPartBase, BaseRightFoot]
  id: EmergencyRightFoot
  name: аварийная правая ступня
  components:
  - type: Sprite
    state: r_leg
  - type: Icon
    state: r_leg
  - type: BodyPart
    baseLayerId: MobEmergencyBlank

# --- Arms (functional metal stump, no bonuses) ---
- type: entity
  parent: [EmergencyLimbPartBase, BaseLeftArm]
  id: EmergencyLeftArm
  name: аварийная левая рука
  description: Грубый аварийный протез Tel-Adi. Работает, но хуже настоящей руки и легко ломается.
  components:
  - type: Sprite
    state: l_arm
  - type: Icon
    state: l_arm
  - type: BodyPart
    baseLayerId: MobEmergencyLArm
  - type: GenerateChildPart
    id: EmergencyLeftHand

- type: entity
  parent: [EmergencyLimbPartBase, BaseRightArm]
  id: EmergencyRightArm
  name: аварийная правая рука
  description: Грубый аварийный протез Tel-Adi. Работает, но хуже настоящей руки и легко ломается.
  components:
  - type: Sprite
    state: r_arm
  - type: Icon
    state: r_arm
  - type: BodyPart
    baseLayerId: MobEmergencyRArm
  - type: GenerateChildPart
    id: EmergencyRightHand

# --- Legs (slower than normal 2.5/4.5) ---
- type: entity
  parent: [EmergencyLimbPartBase, BaseLeftLeg]
  id: EmergencyLeftLeg
  name: аварийная левая нога
  description: Грубый аварийный протез Tel-Adi. Ходит медленнее настоящей ноги и легко ломается.
  components:
  - type: Sprite
    state: l_leg
  - type: Icon
    state: l_leg
  - type: BodyPart
    baseLayerId: MobEmergencyLLeg
  - type: MovementBodyPart
    walkSpeed: 2.0
    sprintSpeed: 3.5
  - type: GenerateChildPart
    id: EmergencyLeftFoot

- type: entity
  parent: [EmergencyLimbPartBase, BaseRightLeg]
  id: EmergencyRightLeg
  name: аварийная правая нога
  description: Грубый аварийный протез Tel-Adi. Ходит медленнее настоящей ноги и легко ломается.
  components:
  - type: Sprite
    state: r_leg
  - type: Icon
    state: r_leg
  - type: BodyPart
    baseLayerId: MobEmergencyRLeg
  - type: MovementBodyPart
    walkSpeed: 2.0
    sprintSpeed: 3.5
  - type: GenerateChildPart
    id: EmergencyRightFoot
