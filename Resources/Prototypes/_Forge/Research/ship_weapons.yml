# Kinetic:     Entry → RAC-30 → AK570 → Dravon → Bofors → Longbow / Cyrexa / Charon
# Laser:       Entry → Type-35 → Prometheus → Cerberus
# Missile:     Midline → Vanyk → Serpent / Light Munitions Bay; Midline → Tovek → Trident
# EMP:         Midline → Tarnyx
# Mining:      Entry + Prometheus → Apollo
#
# Entry (L85, Phalanx, M25) and midline (RAC-30, Vespera, M220) are bundled research nodes.
# Naval weapon fabricator unlocks with the midline bundle (Forge-Change).

# T4 kinetic capitals: Longbow and Charon no longer require advanced bluespace drive research.
# --- Entry bundle: L85 + Phalanx + M25 ---

- type: technology
  id: ForgeShipWeaponResearchEntry
  name: forge-research-technology-shipweapon-entry
  entityIcon: WeaponTurretL85Autocannon
  discipline: ShipArmory
  tier: 3
  cost: 25000
  recipeUnlocks:
  - WeaponTurretL85AutocannonCircuitboard
  - WeaponLaserTurretL1PhalanxCircuitboard
  - WeaponTurretM25Circuitboard
  technologyPrerequisites:
  - BasicShuttleArmament
  - ShuttleAdvancedComponents
  position: -11, 4

