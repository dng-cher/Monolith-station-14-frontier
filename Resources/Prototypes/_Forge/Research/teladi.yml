# Tel-Adi ARS research — disk-gated discipline + technology.
# The discipline is not supported by R&D servers by default; inserting
# DisciplinesDiskTelAdi adds it, which makes this branch researchable.

- type: techDiscipline
  id: TelAdi
  name: research-discipline-tel-adi
  color: "#D4AF37"
  icon:
    sprite: Forge/Interface/Misc/company_icons.rsi
    state: tel_adi
  tierPrerequisites:
    1: 0
    2: 0.5
    3: 0.5
  uiName: Tel-Adi

