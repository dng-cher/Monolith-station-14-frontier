# Periodic bluespace grid spawns — maps under /Maps/_Forge/Events/Periodic/
# Pattern: nf_bluespace_grids_events.yml / events_bluespace.yml (Forge audio)

- type: entity
  id: ForgeBluespacePeriodicDinoCaves
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-bluespace-cave-ftl-start-announcement 
    startAudio:
      path: /Audio/_Forge/Announcements/Events/oleg_bluespace_asteroid_arrival.ogg
    warningAnnouncement: station-event-bluespace-cave-ftl-warning-announcement
    endAnnouncement: station-event-bluespace-cave-ftl-end-announcement
    endAudio:
      path: /Audio/_Forge/Announcements/Events/oleg_bluespace_asteroid_leave.ogg
    earliestStart: 20
    weight: 1
    duration: 1800
    maxDuration: 2400
    reoccurrenceDelay: 240
  - type: BluespaceErrorRule
    groups:
      grid: !type:GridSpawnGroup
        nameLoc:
        - station-event-bluespace-name-Cave
        minimumDistance: 5500
        maximumDistance: 9500
        addComponents:
        - type: Gravity
          enabled: true
          inherent: true
        - type: IFF
        - type: LinkedLifecycleGridParent
        - type: ProtectedGrid
          preventArtifactTriggers: true
        - type: PreventPilot
        - type: ForceAnchor
        paths:
        - /Maps/_Forge/Events/Periodic/Caves/DinoCaves.yml

