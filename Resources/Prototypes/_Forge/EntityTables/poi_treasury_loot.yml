# POI treasury loot (entityTable). One random branch per tick unless amount/rolls say otherwise.
# Economy: основной доход — налог с продаж; тик — небольшое тематическое подспорье.

# --- Cash ticks (примерный эквивалент за тик, не джекпот) ---------------------

- type: entityTable
  id: PoiTreasuryLootCashTickSmall
  table: !type:GroupSelector
    children:
    - !type:EntSelector
      id: SpaceCash
      amount: !type:ConstantNumberSelector
        value: 30000
    - !type:EntSelector
      id: SpaceCash
      amount: !type:ConstantNumberSelector
        value: 40000

- type: entityTable
  id: PoiTreasuryLootCashTickMedium
  table: !type:GroupSelector
    children:
    - !type:EntSelector
      id: SpaceCash
      amount: !type:ConstantNumberSelector
        value: 50000
    - !type:EntSelector
      id: SpaceCash
      amount: !type:ConstantNumberSelector
        value: 60000

- type: entityTable
  id: PoiTreasuryLootCashTickLarge
  table: !type:GroupSelector
    children:
    - !type:EntSelector
      id: SpaceCash
      amount: !type:ConstantNumberSelector
        value: 60000
    - !type:EntSelector
      id: SpaceCash
      amount: !type:ConstantNumberSelector
        value: 80000
    - !type:EntSelector
      id: SpaceCash
      amount: !type:ConstantNumberSelector
        value: 100000
      weight: 0.5

# Legacy aliases (часовня, свалка, био)
- type: entityTable
  id: PoiTreasuryLootCashLow
  table: !type:NestedSelector
    tableId: PoiTreasuryLootCashTickSmall

- type: entityTable
  id: PoiTreasuryLootCashMid
  table: !type:NestedSelector
    tableId: PoiTreasuryLootCashTickMedium

- type: entityTable
  id: PoiTreasuryLootCashHigh
  table: !type:NestedSelector
    tableId: PoiTreasuryLootCashTickLarge

