# Действия ИИ Душегуба — копии станционных, но с фирменными иконками Tel-Adi.
# Раздаются через SoulkillerHeld (только Душегубу, обычный ИИ не затронут).

- type: entity
  id: ActionSoulkillerJumpToCore
  name: Прыжок к ядру
  description: Возвращает глаз обратно в ядро.
  components:
  - type: InstantAction
    priority: -9
    itemIconStyle: BigAction
    icon:
      sprite: Forge/Interface/Actions/soulkiller_ai.rsi
      state: ai_core
    event: !type:JumpToCoreEvent

- type: entity
  id: ActionSoulkillerCameraLights
  name: Подсветка камер
  description: Включает свет у камер наблюдения рядом с обзором.
  components:
  - type: InstantAction
    priority: -5
    itemIconStyle: BigAction
    icon:
      sprite: Forge/Interface/Actions/soulkiller_ai.rsi
      state: camera_light
    event: !type:RelayedActionComponentChangeEvent
      components:
      - type: LightOnCollideCollider
      - type: FixturesChange
        fixtures:
          lightTrigger:
            shape:
              !type:PhysShapeCircle
              radius: 0.35
            density: 80
            hard: false
            layer:
            - GhostImpassable

- type: entity
  id: ActionSoulkillerCommunications
  name: Консоль связи
  description: Открыть интерфейс связи.
  components:
  - type: InstantAction
    icon: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: comms_console }
    iconOn: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: comms_console }
    keywords: [ "AI", "console", "interface" ]
    priority: -4
    event: !type:ToggleIntrinsicUIEvent { key: enum.CommunicationsConsoleUiKey.Key }

- type: entity
  id: ActionSoulkillerRadar
  name: Масс-сканер
  description: Открыть интерфейс масс-сканера.
  components:
  - type: InstantAction
    icon: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: mass_scanner }
    iconOn: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: mass_scanner }
    keywords: [ "AI", "console", "interface" ]
    priority: -6
    event: !type:ToggleIntrinsicUIEvent { key: enum.RadarConsoleUiKey.Key }

- type: entity
  id: ActionSoulkillerCrewMonitoring
  name: Мониторинг экипажа
  description: Открыть интерфейс мониторинга экипажа.
  components:
  - type: InstantAction
    icon: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: crew_monitor }
    iconOn: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: crew_monitor }
    keywords: [ "AI", "console", "interface" ]
    priority: -8
    event: !type:ToggleIntrinsicUIEvent { key: enum.CrewMonitoringUIKey.Key }

- type: entity
  id: ActionSoulkillerStationRecords
  name: Записи станции
  description: Открыть интерфейс записей станции.
  components:
  - type: InstantAction
    icon: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: station_records }
    iconOn: { sprite: Forge/Interface/Actions/soulkiller_ai.rsi, state: station_records }
    keywords: [ "AI", "console", "interface" ]
    priority: -7
    event: !type:ToggleIntrinsicUIEvent { key: enum.GeneralStationRecordConsoleKey.Key }

# Прыжок ока к связанному серверу Душегуба (например, на удалённый шаттл).
- type: entity
  id: ActionSoulkillerJumpToServer
  name: Прыжок к серверу
  description: Перебрасывает око ИИ к связанному серверу Душегуба (например, на удалённый шаттл). Назад — «Прыжок к ядру».
  components:
  - type: InstantAction
    priority: -8
    itemIconStyle: BigAction
    icon:
      sprite: Forge/Interface/Actions/soulkiller_ai.rsi
      state: mass_scanner
    event: !type:SoulkillerJumpToServerEvent
