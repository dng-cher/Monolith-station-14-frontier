# Действие отращивания аварийной конечности (даётся при вживлении импланта).
- type: entity
  id: ActionRegrowEmergencyLimb
  name: Отрастить конечность
  description: Выбери отсутствующую руку или ногу на панели частей тела и активируй — имплант вырастит грубый протез. Тратит один заряд.
  components:
  - type: InstantAction
    priority: -5
    itemIconStyle: BigAction
    icon:
      sprite: Forge/Objects/Specific/Medical/emergency_limb.rsi
      state: icon_off
    event: !type:RegrowEmergencyLimbEvent
