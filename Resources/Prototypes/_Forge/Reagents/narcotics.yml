# region Codeine
- type: reagent
  id: Codeine
  name: reagent-name-codeine
  group: Narcotics
  desc: reagent-desc-codeine
  physicalDesc: reagent-physical-desc-soothing
  flavor: bitter
  color: "#d4c5a9"
  metabolisms:
    Medicine:
      metabolismRate: 0.5
      effects:
        - !type:HealthChange
          conditions:
            - !type:TotalDamage
              min: 5
          damage:
            groups:
              Brute: -4
              Burn: -2
    Narcotic:
      metabolismRate: 0.5
      effects:
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          type: Remove
          time: 3
          probability: 0.05
        - !type:Drunk
          slurSpeech: false
          boozePower: 2
        - !type:PopupMessage
          type: Local
          visualType: Small
          messages: [ "generic-reagent-effect-nauseous" ]
          probability: 0.2
          conditions:
            - !type:ReagentThreshold
              min: 4
        - !type:AddictiveEffect
          addictionId: Morphine
          toleranceGain: 0.006

# region Morphine
- type: reagent
  id: Morphine
  name: reagent-name-morphine
  group: Narcotics
  desc: reagent-desc-morphine
  physicalDesc: reagent-physical-desc-soothing
  flavor: bitter
  color: "#c8d8e0"
  metabolisms:
    Medicine:
      metabolismRate: 0.75
      effects:
        - !type:HealthChange
          conditions:
            - !type:TotalDamage
              min: 5
            - !type:AddictionCondition
              addictionId: Morphine
              min: 0.0
              max: 0.5
          damage:
            groups:
              Brute: -5 # Painkiller btw
              Toxin: -0.5
        - !type:HealthChange
          conditions:
            - !type:TotalDamage
              min: 5
            - !type:AddictionCondition
              addictionId: Morphine
              min: 0.5
              max: 1.0
          damage:
            groups:
              Brute: -2
              Toxin: -0.2
    Narcotic:
      metabolismRate: 0.75
      effects:
        - !type:MovespeedModifier
          walkSpeedModifier: 1.01
          sprintSpeedModifier: 1.01
        - !type:GenericStatusEffect
          key: Stutter
          component: StutteringAccent
          probability: 0.5
        - !type:Jitter
          probability: 0.4
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          type: Remove
          time: 6
          probability: 0.07
        - !type:Drunk
          slurSpeech: true
          boozePower: 4
        - !type:ChemVomit
          probability: 0.1
          conditions:
            - !type:ReagentThreshold
              min: 3
            - !type:AddictionCondition
              addictionId: Morphine
              min: 0.5
              max: 1.0
        - !type:ChemVomit
          probability: 0.04
          conditions:
            - !type:ReagentThreshold
              min: 8
        - !type:HealthChange
          conditions:
            - !type:ReagentThreshold
              min: 10
          damage:
            types:
              Poison: 1.2
              Asphyxiation: 2
        - !type:HealthChange
          conditions:
            - !type:ReagentThreshold
              min: 18
          damage:
            types:
              Poison: 3
              Asphyxiation: 3.5
        - !type:PopupMessage
          conditions:
            - !type:ReagentThreshold
              min: 2
          type: Local
          visualType: Medium
          messages: [ "generic-reagent-effect-nauseous" ]
          probability: 0.4
        - !type:AddictiveEffect
          addictionId: Morphine
          toleranceGain: 0.009
