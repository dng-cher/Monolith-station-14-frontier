# region Stimulants
- type: addiction
  id: Stimulants
  withdrawalDelay: 300
  toleranceDecayRate: 0.00002
  withdrawalDecayRate: 0.0005
  stages:
    - minTolerance: 0.3
      effectInterval: 6
      effects:
        - !type:Jitter
          probability: 0.4
        - !type:PopupMessage
          type: Local
          messages:
            - addiction-stimulants-hint-1
            - addiction-stimulants-hint-2
          visualType: Medium
          probability: 0.08
      withdrawalEffects:
        - !type:MovespeedModifier
          walkSpeedModifier: 0.9
          sprintSpeedModifier: 0.9
          statusLifetime: 6
        - !type:Emote
          emote: Yawn
          showInChat: true
          probability: 0.1
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          type: Remove
          time: 1
          probability: 0.3
        - !type:PopupMessage
          type: Local
          messages:
            - addiction-stimulants-withdrawal-1
          visualType: MediumCaution
          probability: 0.12
    - minTolerance: 0.6
      effectInterval: 5
      effects:
        - !type:Jitter
          probability: 0.6
        - !type:MovespeedModifier
          walkSpeedModifier: 0.85
          sprintSpeedModifier: 0.85
          statusLifetime: 5
        - !type:GenericStatusEffect
          key: Stutter
          component: StutteringAccent
          time: 4
          type: Add
          probability: 0.3
        - !type:PopupMessage
          type: Local
          messages:
            - addiction-stimulants-hint-3
            - addiction-stimulants-hint-4
          visualType: MediumCaution
          probability: 0.08
      withdrawalEffects:
        - !type:MovespeedModifier
          walkSpeedModifier: 0.7
          sprintSpeedModifier: 0.7
          statusLifetime: 6
        - !type:Emote
          emote: Yawn
          showInChat: true
          probability: 0.1
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          type: Add
          time: 2
          probability: 0.05
        - !type:PopupMessage
          type: Local
          messages:
            - addiction-stimulants-withdrawal-2
            - addiction-stimulants-withdrawal-3
          visualType: MediumCaution
          probability: 0.15
    - minTolerance: 0.9
      effectInterval: 4
      effects:
        - !type:Jitter
          probability: 0.8
        - !type:MovespeedModifier
          walkSpeedModifier: 0.6
          sprintSpeedModifier: 0.6
          statusLifetime: 4
        - !type:GenericStatusEffect
          key: TemporaryBlindness
          component: TemporaryBlindness
          time: 2
          type: Add
          probability: 0.15
        - !type:HealthChange
          damage:
            types:
              Poison: 1
        - !type:PopupMessage
          type: Local
          messages:
            - addiction-stimulants-hint-5
            - addiction-stimulants-hint-6
          visualType: LargeCaution
          probability: 0.1
      withdrawalEffects:
        - !type:Emote
          emote: Yawn
          showInChat: true
          probability: 0.1
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          type: Add
          time: 2
          probability: 0.01
        - !type:GenericStatusEffect
          key: TemporaryBlindness
          component: TemporaryBlindness
          time: 3
          type: Add
          probability: 0.15
        - !type:HealthChange
          damage:
            types:
              Poison: 0.5
        - !type:PopupMessage
          type: Local
          messages:
            - addiction-stimulants-withdrawal-4
            - addiction-stimulants-withdrawal-5
          visualType: LargeCaution
          probability: 0.2

