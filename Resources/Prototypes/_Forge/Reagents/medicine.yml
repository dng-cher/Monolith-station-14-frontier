# region Clonidine
# Alpha-2 suppresses withdrawal symptoms
- type: reagent
  id: Clonidine
  name: reagent-name-clonidine
  group: Medicine
  desc: reagent-desc-clonidine
  physicalDesc: reagent-physical-desc-clear
  flavor: bitter
  color: "#e8e8f0"
  metabolisms:
    Medicine:
      metabolismRate: 0.4
      effects:
        - !type:MovespeedModifier
          hidden: true
          walkSpeedModifier: 0.95
          sprintSpeedModifier: 0.95
          statusLifetime: 5
        - !type:GenericStatusEffect
          key: Jitter
          time: 4
          type: Remove
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          type: Add
          time: 3
          probability: 0.1
          refresh: false
        - !type:SuppressEffect
          # hidden: true
          syndrome: StimulantAddiction
          duration: 380
        - !type:GenericDescEffect
          description: forge-reagent-effect-clonidine
        # Addiction
        - !type:ToleranceEffect
          # hidden: true
          reagent: Clonidine
          amount: 0.01
        - !type:SyndromeEffect
          hidden: true
          conditions:
            - !type:ToleranceCondition
              reagent: Clonidine
              source: Brain
              min: 0.3
              max: 1.0
          syndrome: SedativeAddiction
          severity: 1.1
        - !type:GenericDescEffect
          description: forge-reagent-tolerance-addiction
