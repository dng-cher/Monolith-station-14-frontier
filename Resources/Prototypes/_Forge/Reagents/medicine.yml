# region Nanomachines
# , son
- type: reagent
  id: CombatNanites
  name: reagent-name-combat-nanites
  group: Medicine
  desc: reagent-desc-combat-nanites
  physicalDesc: reagent-physical-desc-neural
  recognizable: true
  flavor: medicine
  color: "#707070"
  metabolisms:
    Medicine:
      metabolismRate: 1
      effects:
        - !type:HealthChange
          conditions:
          - !type:MobStateCondition
            mobstate: Alive
          - !type:ReagentThreshold
            max: 5.99
          damage:
            types:
              Blunt: -20
              Slash: -20
              Piercing: -20
              Poison: -20
              Heat: -20
              Shock: -20
              Cold: -20
              Caustic: -20
              Radiation: -20
              Asphyxiation: -30
              Bloodloss: -30
              Cellular: -20
        - !type:ModifyBleedAmount
          conditions:
          - !type:MobStateCondition
            mobstate: Alive
          - !type:ReagentThreshold
            max: 6
          amount: -3
        - !type:HealthChange
          conditions:
          - !type:ReagentThreshold
            min: 6
          damage:
            types:
              Cellular: 50
        - !type:HealthChange
          conditions:
          - !type:MobStateCondition
            mobstate: Critical
          - !type:ReagentThreshold
            max: 5.99
          damage:
            types:
              Blunt: -50
              Slash: -50
              Piercing: -50
              Poison: -50
              Heat: -50
              Shock: -50
              Cold: -50
              Caustic: -50
              Asphyxiation: -60
              Bloodloss: -60
        - !type:SatiateHunger
            factor: 12
        - !type:SatiateThirst
          factor: 12
        - !type:ModifyBloodLevel
          conditions:
          - !type:MobStateCondition
            mobstate: Alive
          amount: 12

# region Naloxone
# opioid antagonist
- type: reagent
  id: Naloxone
  name: reagent-name-naloxone
  group: Medicine
  desc: reagent-desc-naloxone
  physicalDesc: reagent-physical-desc-clear
  flavor: bitter
  color: "#d4ecd4"
  metabolisms:
    Medicine:
      metabolismRate: 0.5
      effects:
        - !type:CureAddictionEffect
          addictionId: Fentanyl
          amount: 0.08
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          time: 2
          type: Add
          probability: 0.05
          conditions:
            - !type:AddictionCondition
              addictionId: Fentanyl
              min: 0.4
              max: 1.0
        - !type:ChemVomit
          probability: 0.5
          conditions:
            - !type:AddictionCondition
              addictionId: Fentanyl
              min: 0.4
              max: 1.0
        - !type:PopupMessage
          type: Local
          visualType: MediumCaution
          messages: [ "reagent-effect-naloxone-withdrawal" ]
          probability: 0.8
          conditions:
            - !type:AddictionCondition
              addictionId: Fentanyl
              min: 0.4
              max: 1.0
        - !type:Emote
          emote: Yawn
          showInChat: true
          probability: 0.1
          conditions:
            - !type:AddictionCondition
              addictionId: Fentanyl
              min: 0.4
              max: 1.0
        - !type:CureAddictionEffect
          addictionId: Morphine
          amount: 0.06
        - !type:GenericStatusEffect
          key: Drowsiness
          component: Drowsiness
          time: 2
          type: Add
          probability: 0.05
          conditions:
            - !type:AddictionCondition
              addictionId: Morphine
              min: 0.4
              max: 1.0
        - !type:Emote
          emote: Yawn
          showInChat: true
          probability: 0.1
          conditions:
            - !type:AddictionCondition
              addictionId: Morphine
              min: 0.4
              max: 1.0
        - !type:ChemVomit
          probability: 0.3
          conditions:
            - !type:AddictionCondition
              addictionId: Morphine
              min: 0.4
              max: 1.0
        - !type:PopupMessage
          type: Local
          visualType: MediumCaution
          messages: [ "reagent-effect-naloxone-withdrawal" ]
          probability: 0.6
          conditions:
            - !type:AddictionCondition
              addictionId: Morphine
              min: 0.4
              max: 1.0
