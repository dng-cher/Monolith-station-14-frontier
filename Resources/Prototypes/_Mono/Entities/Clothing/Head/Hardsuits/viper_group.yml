- type: entity
  parent: [ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase, ShowSecurityIcons]
  id: ClothingHeadHelmetHardsuitViperGroupStandard
  name: JACKAL mk.II viper hardsuit helmet
  description: A hardsuit helmet with signature markings of the Viper Group. Has a built-in night-vision system complemented by flash resistant viewports.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Head/Hardsuits/viper_group_standard.rsi
  - type: Clothing
    sprite: _Mono/Clothing/Head/Hardsuits/viper_group_standard.rsi
  - type: PointLight
    color: "#eb772a"
    radius: 6 # Forge-Change
    energy: 4 # Forge-Change
  - type: NightVision # Gen 4 dualtube
    relayOverlay: true
    goggleEffect: true
    action: ActionToggleNightVision
    viewCircleRadius: 400
    viewCircleCount: 2
    viewCircleSpacing: 260
    phosphorColor: "#41D7D9"
    lightingColor: "#FFFFFF32"
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9 # 0.95->0.9 Forge-Change
        Slash: 0.9 # 0.95->0.9 Forge-Change
        Piercing: 0.9 # 0.95->0.9 Forge-Change
        Heat: 0.9  # 0.95->0.9 Forge-Change
  - type: FlashImmunity
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide

