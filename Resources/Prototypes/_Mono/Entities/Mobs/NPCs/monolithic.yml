
- type: entity
  abstract: true
  id: MobSpawnMonolithicBase
  parent: MarkerBase
  name: spawner monolithic entity base
  components:
  - type: Transform
    anchored: True
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _Mono/Mobs/monolithic.rsi
    state: gestalt_icon
  - type: Icon
    sprite: _Mono/Mobs/monolithic.rsi
    state: gestalt_icon
  - type: Fixtures
    fixtures:
      portalFixture:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.48,0.25,0.48"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        hard: false
  - type: RandomSpawner
    prototypes:
    - MobMonolithicGestalt
    chance: 1

- type: entity
  id: MobSpawnMonolithicRandomBasic
