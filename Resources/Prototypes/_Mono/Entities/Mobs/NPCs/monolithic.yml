# mobs

- type: entity
  categories: [ HideSpawnMenu ]
  id: MobMonolithicBase
  parent: [ MobNonHumanHostileBase, MobStepTriggerImmune ]
  abstract: true
  name: monolithic energy
  description: Is this god?
  components:
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember
    factions:
    - Monolithic
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.5
    baseSprintSpeed: 3.5
  - type: Sprite
    drawdepth: Mobs
    sprite: Mobs/Elemental/living_light/luminous_person.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: luminous_person
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: glow
      shader: unshaded
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      300: Critical
      340: Dead
    allowRevives: false
  - type: SlowOnDamage
    speedModifierThresholds:
      250: 0.9
  - type: DamageStateVisuals
    states:
      Alive:
        Base: luminous_person
      Critical:
        Base: dead
        BaseUnshaded: dead_unshaded
      Dead:
        Base: dead
        BaseUnshaded: dead_unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: RGlass
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 1000
    damage:
      groups:
        Brute: -1
      types:
        Heat: -0.5
  - type: NoSlip
  - type: Pullable
  - type: ZombieImmune
  - type: NameIdentifier
    group: GenericNumber
  - type: PointLight
    radius: 1.0
    energy: 1.5
    color: "#91469e"
  - type: Speech
    enabled: false
  - type: ReplacementAccent
    accent: genericAggressive
  - type: Tag
    tags:
    - FootstepSound
    - CannotSuicide
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MonolithicCrystalSmall:
            min: 0
            max: 1
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.05
  - type: FireProtection
    reduction: 1
  - type: SolutionContainerManager
  - type: InjectableSolution
    solution: chemicals
  - type: Bloodstream
    bloodReagent: Gestalzitine
    bloodMaxVolume: 0.01
  - type: NightVision # Gen 3 wide-quadtube
    relayOverlay: false
    goggleEffect: true
    viewCircleRadius: 450
    viewCircleCount: 4
    viewCircleSpacing: 280
    action: ActionToggleNightVision
    phosphorColor: "#00FF00"
    lightingColor: "#FFFFFF32"
  - type: CollectiveMind
    channels:
    - MonolithicMind
    defaultChannel: MonolithicMind
  - type: GhostRole
    prob: 0.05
    makeSentient: false
    allowSpeech: false
    allowMovement: true
    name: ghost-role-information-monolithic-generic-name
    description: ghost-role-information-monolithic-generic-description
    rules: ghost-role-information-monolithic-generic-rules
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 18000 # 5 hrs
  - type: GhostTakeoverAvailable

# actual entity spawners

- type: entity
  id: MobSpawnMonolithicGestalt
  parent: MobSpawnMonolithicBase
  name: monolithic gestalt
  suffix: Spawner
  components:
  - type: Sprite
    sprite: _Mono/Mobs/monolithic.rsi
    state: gestalt_icon
  - type: Icon
    sprite: _Mono/Mobs/monolithic.rsi
    state: gestalt_icon
  - type: RandomSpawner
    prototypes:
    - MobMonolithicGestalt
    chance: 1

- type: entity
  categories: [ HideSpawnMenu ]
  id: MobMonolithicGestalt
  parent: MobMonolithicBase
  name: monolithic gestalt
  description: An anomalous entity. Seems to be composed entirely of some kind of intangible energy, which it seems to be shooting you with. Watch out!
  components:
  - type: Sprite
    sprite: _Mono/Mobs/monolithic.rsi
    layers:
    #- map: [ "enum.DamageStateVisualLayers.Base" ]
    #  state: gestalt
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: gestalt
      shader: unshaded
  - type: DamageStateVisuals
    states:
      Alive:
        Base: gestalt
        BaseUnshaded: gestalt
      Critical:
        Base: dead
        BaseUnshaded: dead_unshaded
      Dead:
        Base: dead
        BaseUnshaded: dead_unshaded
  - type: MeleeWeapon
    damage:
      types:
        Heat: 5
  - type: ProjectileBatteryAmmoProvider
    proto: BulletMonolithicGestalt
    fireCost: 100
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 1000
  - type: Gun
    fireRate: 2
    minAngle: 10
    maxAngle: 40
    useKey: false
    showExamineText: false
    selectedMode: Burst
    availableModes:
    - Burst
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser3.ogg
    soundEmpty:
      path: /Audio/Items/Lighters/lighter_off.ogg
    burstCooldown: 4
    burstFireRate: 14
    shotsPerBurst: 6
  - type: Reflect # gigatroll, gotta use melee on these guys
    reflectProb: 0.95
    spread: 20
  - type: Stealth
    minVisibility: 0.3
    maxVisibility: 0.4
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 60
        mask:
        - MobMask
        layer:
        - MobLayer
        - Opaque
  - type: MovementIgnoreGravity
  - type: MobThresholds
    thresholds:
      0: Alive
      60: Critical
      140: Dead
    allowRevives: false
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MonolithicCrystalSmall:
            min: 0
            max: 1

# golom

- type: entity
  id: MobSpawnMonolithicGolom
  parent: MobSpawnMonolithicBase
  name: monolithic golom
  suffix: Spawner
  components:
    - type: Sprite
      sprite: _Mono/Mobs/monolithic.rsi
