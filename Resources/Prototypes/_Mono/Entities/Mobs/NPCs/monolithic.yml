# region intermediate monolith mobs

# golom ranged

- type: entity
  id: MobSpawnMonolithicGolomRanged
  parent: MobSpawnMonolithicBase
  name: monolithic ranged golom
  suffix: Spawner
  components:
    - type: Sprite
      sprite: _Mono/Mobs/monolithic.rsi
      state: golom_icon
    - type: Icon
      sprite: _Mono/Mobs/monolithic.rsi
      state: golom_icon
    - type: RandomSpawner
      prototypes:
      - MobMonolithicGolomRanged
      chance: 1

- type: entity
  categories: [ HideSpawnMenu ]
  id: MobMonolithicGolomRanged
  parent: MobMonolithicBase
  name: monolithic golum
  description: An anomalous entity. Seems to be composed entirely of some kind of durable, crystal-like energy, which it is shooting at you. Watch out!
  components:
  - type: Sprite
    sprite: _Mono/Mobs/monolithic.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: golom
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: golom_crystals
      shader: unshaded
  - type: DamageStateVisuals
    states:
      Alive:
        Base: golom
      Critical:
        Base: dead
        BaseUnshaded: dead_unshaded
      Dead:
        Base: dead
        BaseUnshaded: dead_unshaded
  - type: MeleeWeapon
    attackRate: 1
    hidden: true
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 50
        Structural: 300
    altDisarm: false
    angle: 0
    animation: WeaponArcPunch
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MonolithicCrystalMedium:
            min: 0
            max: 1
  - type: MobThresholds
    thresholds:
      0: Alive
      400: Critical
      490: Dead
  - type: MovementSpeedModifier
    baseSprintSpeed: 2
    baseWalkSpeed: 1.5
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
  - type: MovementIgnoreGravity
  - type: ProjectileBatteryAmmoProvider
    proto: BulletMonolithicGolomRanged
    fireCost: 100
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 1000
  - type: Gun
    fireRate: 0.5
    minAngle: 5
    maxAngle: 20
    useKey: false
    showExamineText: false
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser3.ogg
    soundEmpty:
      path: /Audio/Items/Lighters/lighter_off.ogg
