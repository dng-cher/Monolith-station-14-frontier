  components:
    - type: Sprite
      sprite: _Mono/Mobs/monolithic.rsi
      layers:
        - map: [ "enum.DamageStateVisualLayers.Base" ]
          state: locust
        - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
          state: locust_crystals
          shader: unshaded
    - type: DamageStateVisuals
      states:
        Alive:
          Base: locust
        Critical:
          Base: dead
          BaseUnshaded: dead_unshaded
        Dead:
          Base: dead
          BaseUnshaded: dead_unshaded
    - type: MeleeWeapon
      attackRate: 2
      hidden: true
      soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
      damage:
        types:
          Slash: 5
          Pierce: 3
          Heat: 3
          Structural: 30
      altDisarm: false
      angle: 0
      animation: WeaponArcBite
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 250
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: GlassBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                MonolithicCrystalSmall:
                  min: 0
                  max: 1
    - type: MobThresholds
      thresholds:
        0: Alive
        200: Critical
        240: Dead
    - type: MovementSpeedModifier
      baseSprintSpeed: 4.5
      baseWalkSpeed: 3
    - type: HTN
      rootTask:
