      state: golom_icon
    - type: RandomSpawner
      prototypes:
      - MobMonolithicGolom
      chance: 1

- type: entity
  categories: [ HideSpawnMenu ]
  id: MobMonolithicGolom
  parent: MobMonolithicBase
  name: monolithic golom
  description: An anomalous entity. Seems to be composed entirely of some kind of durable, crystal-like energy. It also seems to be heading right towards you.
  components:
  - type: Sprite
    sprite: _Mono/Mobs/monolithic.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: golom
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: golom_crystals
      shader: unshaded
  - type: DamageStateVisuals
    states:
      Alive:
        Base: golom
      Critical:
        Base: dead
        BaseUnshaded: dead_unshaded
      Dead:
        Base: dead
        BaseUnshaded: dead_unshaded
  - type: MeleeWeapon
    attackRate: 1
    hidden: true
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 50
        Structural: 300
    altDisarm: false
    angle: 20
    animation: WeaponArcFist
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MonolithicCrystalSmall:
            min: 0
            max: 1
  - type: MobThresholds
    thresholds:
      0: Alive
      400: Critical
      490: Dead
  - type: MovementSpeedModifier
    baseSprintSpeed: 2
    baseWalkSpeed: 1.5
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: MovementIgnoreGravity

