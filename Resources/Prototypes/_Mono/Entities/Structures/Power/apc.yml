    board: LargeAPCMediumElectronics
  - type: Battery
    maxCharge: 450000
    startingCharge: 120000
  - type: PowerNetworkBattery
    maxSupply: 180000
    maxChargeRate: 60000
    supplyRampTolerance: 45000
    supplyRampRate: 8000
  - type: StaticPrice
    price: 1600

- type: entity
  id: LargeAPC
  parent: LargeAPCBase
  name: LAPC substation
  suffix: Large, 300 kW
