# Wall APC (standard room bus)
- type: entity
  parent: BaseAPC
  id: APCBasicTSF
  suffix: Basic, 50kJ, TSFMC Engineering Locked
  components:
  - type: Battery
    maxCharge: 50000
    startingCharge: 50000
  - type: BatteryDrinkerSource # EE IPCs
    maxAmount: 5000
  - type: AccessReader
    access: [["TsfmcEngineering"]]

# LAPC line — HV→APC bulk substations for shuttles. maxSupply tiers:
# Light 100 kW · Medium 180 kW · Large 300 kW (one heavy shield bus) · Capital 500 kW
- type: entity
  id: LargeAPCBase
  name: LAPC substation
  parent: BaseStructure
  abstract: true
  description: A centralized, reinforced substation terminal for the vessel's electrical systems. Transforms HV to the ship APC bus in bulk. Sized for shield generators and heavy combat loads.
  components:
  - type: StationAiWhitelist
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -9
    range: 2
    sound:
      path: /Audio/Ambience/Objects/hdd_buzz.ogg
  - type: PointLight
    radius: 1.5
    energy: 1.6
  - type: InteractionOutline
  - type: Anchorable
  - type: Sprite
    sprite: _Mono/Structures/Power/Distributors/largeapc.rsi
    offset: 0,0.2
    layers:
    - state: base
    - state: panel
      map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      visible: false
    - state: display-charging
      shader: unshaded
      map: [ "enum.ApcVisualLayers.ChargeState" ]
    - state: lock0-locked
      shader: unshaded
      map: [ "enum.ApcVisualLayers.InterfaceLock" ]
      visible: false
    - state: lock1-locked
      shader: unshaded
      map: [ "enum.ApcVisualLayers.PanelLock" ]
      visible: false
    - state: lock1-locked
      shader: unshaded
      map: [ "enum.ApcVisualLayers.Equipment" ]
      visible: false
    - state: lock1-locked
      shader: unshaded
      map: [ "enum.ApcVisualLayers.Lighting" ]
      visible: false
    - state: lock1-locked
      shader: unshaded
      map: [ "enum.ApcVisualLayers.Environment" ]
      visible: false
  - type: Appearance
  - type: ApcVisuals
  - type: ExaminableBattery
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: HVPower
      output:
        !type:CableDeviceNode
        nodeGroupID: Apc
  - type: PowerMonitoringDevice
    group: APC
    sourceNode: input
    loadNode: output
    collectionName: apc
    sprite: Structures/Power/apc.rsi
    state: static
  - type: BatteryCharger
    voltage: High
  - type: PowerProvider
    voltage: Apc
  - type: Apc
    voltage: Apc
  - type: ExtensionCableProvider
  - type: UserInterface
    interfaces:
      enum.ApcUiKey.Key:
        type: ApcBoundUserInterface
  - type: ActivatableUI
    inHandsOnly: false
    key: enum.ApcUiKey.Key
  - type: WiresPanel
  - type: WiresVisuals
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: StationInfiniteBatteryTarget
  - type: Electrified
    onHandInteract: false
    onInteractUsing: false
    onBump: false
    requirePower: true
    highVoltageNode: input
    lowVoltageNode: output
  - type: LightningTarget
    priority: 1
  - type: GuideHelp
    guides:
    - VoltageNetworks
    - Power
  - type: BatteryDrinkerSource # EE IPCs
    maxAmount: 10000
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.25,0.45,0.25"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Explosive
    explosionType: Default
    totalIntensity: 10.0
    intensitySlope: 5
    maxIntensity: 4
  - type: Construction
    graph: Machine
    node: machine
    containers:
    - machine_board
    - machine_parts
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container

- type: entity
  id: LargeAPCLight
  parent: LargeAPCBase
  name: LAPC substation
  suffix: Light, 100 kW
  description: A compact LAPC for small shuttles, auxiliaries and tier-1 shield buses.
  components:
  - type: Machine
    board: LargeAPCLightElectronics
  - type: Battery
    maxCharge: 250000
    startingCharge: 80000
  - type: PowerNetworkBattery
    maxSupply: 100000
    maxChargeRate: 35000
    supplyRampTolerance: 25000
    supplyRampRate: 5000
  - type: StaticPrice
    price: 1200

- type: entity
  id: LargeAPCMedium
  parent: LargeAPCBase
  name: LAPC substation
  suffix: Medium, 180 kW
  description: A mid-size LAPC sized for tier-2 shields and mixed weapon grids.
  components:
