    board: APCElectronics
  - type: Battery
    maxCharge: 750000
    startingCharge: 200000
  - type: PowerNetworkBattery
    maxSupply: 300000
    maxChargeRate: 100000
    supplyRampTolerance: 100000
    supplyRampRate: 40000
  - type: StaticPrice
    price: 2500

- type: entity
  id: LargeAPCCapital
  parent: LargeAPCBase
  name: LAPC substation
  suffix: Capital, 500 kW
  description: A capital-grade LAPC for siege shields, dual heavy loads or a shield bus with substantial headroom.
  components:
  - type: Machine
    board: LargeAPCCapitalElectronics
  - type: Battery
    maxCharge: 1250000
    startingCharge: 350000
  - type: PowerNetworkBattery
    maxSupply: 500000
    maxChargeRate: 150000
    supplyRampTolerance: 150000
    supplyRampRate: 60000
  - type: StaticPrice
    price: 4000
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
    - trigger:
        !type:DamageTrigger
        damage: 1100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
