# APC
- type: entity
  id: APCElectronics
  parent: BaseElectronics
  name: APC electronics
  description: Circuit used in APC construction. In a machine frame, builds a 300 kW LAPC shield bus substation.
  components:
    - type: ApcElectronics
    - type: Sprite
      sprite: Objects/Misc/module.rsi
      state: charger_APC
    - type: PhysicalComposition
      materialComposition:
        Glass: 50
      chemicalComposition:
        Silicon: 20
    - type: StaticPrice
      price: 34
    - type: MachineBoard # Mono - LAPC Large 300 kW
      prototype: LargeAPC
      requirements:
        Capacitor: 8
      stackRequirements:
        Cable: 8
        CableHV: 8
        PlasmaGlass: 20
        MetalRod: 10

