# Night Vision Goggles

- type: entity
  parent: ClothingEyesBase
  id: ClothingEyesNightVisionGoggles
  name: night vision goggles
  description: Now you can see in the dark!
  components:
  - type: Sprite
    sprite: _White/Clothing/Eyes/Goggles/nightvision.rsi
  - type: Clothing
    sprite: _White/Clothing/Eyes/Goggles/nightvision.rsi
  - type: NightVision # Mono - Wizden NV
    relayOverlay: true
    goggleEffect: true
    action: ActionToggleNightVision
    viewCircleRadius: 350
    viewCircleCount: 2
    viewCircleSpacing: 280
    phosphorColor: "#00FF00"
    lightingColor: "#FFFFFF32"
  - type: IdentityBlocker
    coverage: EYES

# Mono start
# I used these for testing. You can use them for adding them to your suits.
- type: entity
  parent: ClothingEyesNightVisionGoggles
  id: ClothingEyesNightVisionGogglesGen1
  name: night vision goggles (GEN1)
  suffix: DEBUG
  components:
  - type: NightVision
    action: ActionToggleNightVision
    viewCircleRadius: 400
    viewCircleCount: 1
    viewCircleSpacing: 280
    phosphorColor: "#00FF00"

- type: entity
