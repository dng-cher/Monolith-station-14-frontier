- type: constructionGraph
  id: FilingCabinet
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: filingCabinet
          steps:
            - material: Steel
              amount: 4
              doAfter: 3
        - to: tallCabinet
          steps:
            - material: Steel
              amount: 4
              doAfter: 3
        - to: chestDrawer
          steps:
            - material: Steel
              amount: 3
              doAfter: 3
        # Forge-Change-Start
        - to: extinguishercabinet
          steps:
            - material: Steel
              amount: 3
              doAfter: 3
        - to: defibrillatorcabinet
          steps:
            - material: Steel
              amount: 3
              doAfter: 3
        # Forge-Change-End

    - node: filingCabinet
      entity: filingCabinet
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 4
          steps:
            - tool: Screwing
              doAfter: 4
    - node: tallCabinet
      entity: filingCabinetTall
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 4
          steps:
            - tool: Screwing
              doAfter: 4
    - node: chestDrawer
      entity: filingCabinetDrawer
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 3
          steps:
            - tool: Screwing
              doAfter: 4
    # Forge-Change-Start
    - node: extinguishercabinet
      entity: ExtinguisherCabinet
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 3
            - !type:EmptyAllContainers
          steps:
            - tool: Screwing
              doAfter: 4
    - node: defibrillatorcabinet
      entity: DefibrillatorCabinet
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 3
            - !type:EmptyAllContainers
          steps:
            - tool: Screwing
              doAfter: 4
    # Forge-Change-End
