- type: entity
  id: OrganSkrellBrain
  parent: OrganHumanBrain
  name: brain
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Skrell/organ.rsi
    state: brain

- type: entity
  id: OrganSkrellEyes
  parent: OrganHumanEyes
  name: eyes
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Skrell/organ.rsi
    layers:
    - state: eyes

- type: entity
  id: OrganSkrellLungs
  parent: OrganHumanLungs
  name: lungs
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Skrell/organ.rsi
    layers:
    - state: lungs
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Human, Skrell ]
    groups:
    - id: Gas
      rateModifier: 100.0

