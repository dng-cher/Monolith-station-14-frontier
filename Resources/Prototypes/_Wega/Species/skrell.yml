- type: species
  id: Skrell
  name: species-name-skrell
  roundStart: true
  prototype: MobSkrell
  sprites: MobSkrellSprites
  markingLimits: MobSkrellMarkingLimits
  dollPrototype: MobSkrellDummy
  defaultSkinTone: "#5f9b8a"
  skinColoration: Hues
  maleFirstNames: names_first_male
  femaleFirstNames: names_first_female
  lastNames: names_last
  naming: FirstLast
  minAge: 25
  youngAge: 45
  oldAge: 130
  maxAge: 220
  averageHeight: 182

- type: speciesBaseSprites
